<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POS 管理後台</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; font-weight: 900; }
        .header { background: #2c3e50; color: #fff; padding: 20px; text-align: center; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .op-card { background: #fff; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; font-size: 24px; }
        #reader { width: 350px; margin: 20px auto; border-radius: 20px; overflow: hidden; display: none; border: 5px solid #FF8FA3; }
        #loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="loading"><h1>執行中，請稍後...</h1></div>
    <div class="header"><h1>POS 操作系統</h1></div>
    <div id="menu" class="btn-grid">
        <div class="op-card" style="color:green;" onclick="start('add')">➕ 會員加值</div>
        <div class="op-card" style="color:red;" onclick="start('sub')">➖ 會員扣款</div>
    </div>
    <div id="reader"></div>
    <button id="cancel" style="display:none; width:80%; margin: 20px auto; padding: 20px; background: #888; color: #fff; border: none; border-radius: 15px; display: block;" onclick="location.reload()">放棄並返回</button>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbyzNMwjYxA094jdeq4qOJJSPrDdZNs0fJ_K_z5N9Oi1frnwELXlsdbNd0k8BWrvb6t_/exec";
        let mode = "";
        const scanner = new Html5Qrcode("reader");

        function start(m){
            mode = m;
            document.getElementById('menu').style.display='none';
            document.getElementById('reader').style.display='block';
            document.getElementById('cancel').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                scanner.stop();
                process(txt);
            });
        }

        async function process(val){
            let uid = val, amt = 0;
            if(val.includes('|')){ const p=val.split('|'); uid=p[1]; amt=p[2]; }
            else { amt = prompt("請輸入操作金額："); }

            if(!amt || isNaN(amt)) return location.reload();

            // 確定操作確認
            const conf = confirm(`【操作確認】\n對象：${uid}\n模式：${mode==='add'?'加值':'扣款'}\n金額：$${amt}\n\n點選確定即可執行！`);
            if(!conf) return location.reload();

            document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({
                action:'adminAction', uid: uid, 
                amount: mode==='sub' ? -amt : amt, 
                desc: 'POS_OP', adminName: '櫃員'
            })}).then(r=>r.json());

            if(res.success){
                new Audio('https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3').play();
                alert("✅ 操作成功！新餘額：$" + res.message);
            } else {
                new Audio('https://assets.mixkit.co/active_storage/sfx/2016/2016-preview.mp3').play();
                alert("❌ 失敗：" + res.message);
            }
            location.reload();
        }
    </script>
</body>
</html>
