<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POS 專業管理後台</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; font-size: 20px; font-weight: bold; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .card { background: white; padding: 30px; border-radius: 20px; margin: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; }
        .btn { background: #FF8FA3; color: white; border: none; padding: 20px; width: 100%; border-radius: 15px; cursor: pointer; font-size: 22px; }
        .user-list { height: 200px; overflow-y: auto; border: 2px solid #eee; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div><p>系統處理中，請稍後...</p></div>

    <div class="card">
        <h2>發送優惠券</h2>
        <input type="text" id="cName" placeholder="優惠券名稱">
        <input type="number" id="cVal" placeholder="面額 (可選)">
        <input type="number" id="cMin" placeholder="最低消費金額">
        <textarea id="cDesc" placeholder="詳細說明"></textarea>
        
        <p>選擇會員： 
            <button onclick="toggleAll(true)">全選</button> 
            <button onclick="toggleAll(false)">全取消</button>
        </p>
        <div class="user-list" id="uList">載入會員中...</div>
        
        <button class="btn" onclick="sendCoupons()">點選確定發送</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbxK6ITww3uB3C5MPC6XOxR4m1qnVGpuEqlRpXOXa7lyNRiE6fCNGnwLVzZ7D3x0weFH/exec";
        
        async function loadUsers(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users'})}).then(r=>r.json());
            document.getElementById('uList').innerHTML = res.list.map(u => `
                <div><input type="checkbox" class="u-check" value="${u.id}"> ${u.name} (${u.id})</div>
            `).join('');
        }
        
        function toggleAll(st){ document.querySelectorAll('.u-check').forEach(c=>c.checked=st); }

        async function sendCoupons(){
            const ids = Array.from(document.querySelectorAll('.u-check:checked')).map(c=>c.value);
            if(ids.length === 0) return alert("請至少選擇一個會員");
            
            document.getElementById('loader').style.display='flex';
            const data = {
                name: document.getElementById('cName').value,
                val: document.getElementById('cVal').value,
                min: document.getElementById('cMin').value,
                desc: document.getElementById('cDesc').value
            };
            await fetch(GAS,{method:'POST',body:JSON.stringify({action:'addCoupons',cData:data,targetUids:ids})});
            alert("發送成功！");
            location.reload();
        }
        
        loadUsers();
    </script>
</body>
</html>
