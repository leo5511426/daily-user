<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理後台 v10.0</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; font-weight: bold; color: #333; }
        .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .loan-zone { border-top: 5px solid #3b82f6; }
        .pay-zone { border-top: 5px solid #10b981; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-size: 16px; }
        .pay-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card loan-zone">
        <h3 style="color:#3b82f6; margin-top:0;">💰 撥付借款</h3>
        <select id="lUser"><option value="">-- 選擇借款人 --</option></select>
        <input type="text" id="lItem" placeholder="項目名目">
        <input type="number" id="lAmt" placeholder="本金金額">
        <input type="date" id="lDeadline">
        <button class="btn" style="background:#3b82f6;" onclick="doLoan()">確認撥款</button>
    </div>

    <div class="card pay-zone">
        <h3 style="color:#10b981; margin-top:0;">↩️ 複合還款處理</h3>
        <select id="pLoan" onchange="autoFill()"><option value="">-- 選擇待還款項 --</option></select>
        <div class="pay-box">
            <label>💵 實收現金</label>
            <input type="number" id="pCash" oninput="recalc()">
            <label>💳 餘額扣除 (自動計算差額)</label>
            <input type="number" id="pBal" readonly style="background:#eee;">
            <p style="text-align:right; margin:5px 0 0;">總計還款：$ <span id="pTotal">0</span></p>
        </div>
        <button class="btn" style="background:#10b981;" onclick="doPay()">執行還款沖帳</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbxXrH30bwKM8OTkLP3QX-XnS_bOJb_RAlgUVTm4EJTsh0631o58Je5Lvxfc3DbxK8lr/exec";
        async function init() {
            const u = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:'ADMIN'})}).then(r=>r.json());
            u.list.forEach(i => document.getElementById('lUser').innerHTML += `<option value="${i.id}">${i.name}</option>`);
            const l = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:'ADMIN_LIST'})}).then(r=>r.json());
            l.list.forEach(i => document.getElementById('pLoan').innerHTML += `<option value="${i.id}" data-uid="${i.uid}" data-rem="${i.remain}">${i.uid} - ${i.item} (欠$${i.remain})</option>`);
        }

        function autoFill() {
            const opt = pLoan.selectedOptions[0];
            if(opt.dataset.rem) {
                document.getElementById('pCash').value = opt.dataset.rem;
                recalc();
            }
        }

        function recalc() {
            const opt = pLoan.selectedOptions[0];
            if(!opt.dataset.rem) return;
            const total = parseFloat(opt.dataset.rem);
            const cash = parseFloat(document.getElementById('pCash').value) || 0;
            const bal = (cash < total) ? total - cash : 0;
            document.getElementById('pBal').value = bal.toFixed(0);
            document.getElementById('pTotal').innerText = (cash + bal).toFixed(0);
        }

        async function doLoan() {
            await send({ action:'adminAction', type:'create_loan', uid:lUser.value, loanItem:lItem.value, amount:lAmt.value, deadline:lDeadline.value });
        }

        async function doPay() {
            const opt = pLoan.selectedOptions[0];
            await send({ action:'adminAction', type:'pay_loan', loanId:opt.value, uid:opt.dataset.uid, cashPart:pCash.value, balPart:pBal.value });
        }

        async function send(b) {
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify(b)}).then(r=>r.json());
            alert(res.message); location.reload();
        }
        init();
    </script>
</body>
</html>
