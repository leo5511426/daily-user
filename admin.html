<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑管理台 v16.3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4f46e5; --dark: #0f172a; --bg: #f8fafc; --orange: #f59e0b; --red: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        .dashboard { background: var(--dark); color: white; padding: 25px 20px; border-radius: 0 0 25px 25px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .menu-btn { background: white; padding: 20px 10px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .full-btn { grid-column: span 2; background: var(--primary); color: white; border: none; font-size: 1.1rem; }
        
        /* 置中樣式 */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:5000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 88%; max-width: 380px; border-radius: 28px; padding: 25px; box-sizing: border-box; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); text-align: center; }
        
        .wiz-input { width: 100%; padding: 16px; font-size: 1.1rem; border-radius: 14px; border: 2px solid #e2e8f0; margin-bottom: 15px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-main { flex: 2; padding: 16px; border-radius: 14px; background: var(--primary); color: white; border: none; font-weight: bold; }
        .btn-sec { flex: 1; padding: 16px; border-radius: 14px; background: #f1f5f9; color: #64748b; border: none; }
        
        /* 智慧提示卡片 */
        .smart-info { background: #fdf2f2; border: 2px dashed #fecaca; padding: 15px; border-radius: 18px; margin: 15px 0; text-align: left; }
        .mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>

    <div id="syncMask" class="mask" style="display: flex;"><b>資料讀取中...</b></div>

    <div class="dashboard">
        <h2 style="margin:0;">管理工作台</h2>
        <div style="font-size:14px; margin-top:5px; opacity:0.8;">請先掃描會員條碼</div>
    </div>

    <div class="menu-grid">
        <button class="menu-btn full-btn" onclick="startScan()">📷 掃描會員 QR</button>
        <div class="menu-btn" onclick="openWizard('add')">💰 加值</div>
        <div class="menu-btn" onclick="openWizard('sub')">🛒 扣款</div>
        <div class="menu-btn" onclick="openWizard('loan')">🏦 撥款</div>
        <div class="menu-btn" onclick="openWizard('pay')">🤝 還款</div>
        <div class="menu-btn full-btn" style="background:var(--orange);" onclick="openWizard('coupon')">🎟️ 發送優惠券</div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">掃描中...</h3>
            <div id="qrDiv" style="width:100%; border-radius:15px; overflow:hidden;"></div>
            <button class="btn-sec" style="width:100%; margin-top:15px;" onclick="closeQr()">關閉掃描</button>
        </div>
    </div>

    <div id="smartModal" class="modal">
        <div class="modal-content">
            <h2 id="sName" style="margin:0;">---</h2>
            <p id="sBal" style="font-size:1.2rem; color:var(--primary); margin:10px 0;">餘額: $0</p>
            
            <div id="smartBox" class="smart-info">
                </div>

            <div class="btn-group">
                <button class="btn-sec" onclick="closeModal('smartModal')">暫不需要</button>
                <button class="btn-main" id="sActionBtn">前往處理</button>
            </div>
        </div>
    </div>

    <div id="wizModal" class="modal">
        <div class="modal-content">
            <div id="wizBody"></div>
            <div class="btn-group">
                <button class="btn-sec" onclick="closeModal('wizModal')">取消</button>
                <button class="btn-main" id="wizNextBtn" onclick="wizNext()">下一步</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxQ7-UrViyPG4Q2Gfu4U6vK6g9rphsUMTQZrCqtvfkPjbirEQj4bJjTaztrIOnlEUD3/exec"; 
        let U_DB = [], CUR_MODE = "", CUR_STEP = 0, FORM = {}, html5QrCode = null;

        window.onload = refreshData;

        async function refreshData() {
            const r = await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:'ADMIN'})}).then(r=>r.json());
            U_DB = r.list;
            document.getElementById('syncMask').style.display = 'none';
        }

        function startScan() {
            document.getElementById('qrModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("qrDiv");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 220 }, (txt) => {
                const u = U_DB.find(i => String(i.id).trim() === String(txt).trim());
                if(u) { closeQr(); showSmart(u); }
            });
        }

        function closeQr() { if(html5QrCode) html5QrCode.stop(); document.getElementById('qrModal').style.display = 'none'; }

        // 智慧顯示邏輯
        function showSmart(u) {
            document.getElementById('sName').innerText = u.name;
            document.getElementById('sBal').innerText = `帳戶餘額: $${u.bal}`;
            const box = document.getElementById('smartBox');
            const btn = document.getElementById('sActionBtn');
            
            if (u.bal <= 0) {
                box.style.background = "#fff7ed"; box.style.borderColor = "#ffedd5";
                box.innerHTML = `<b style="color:var(--orange);">💡 餘額建議：</b><br>客戶餘額為 0，是否要辦理補點加值？`;
                btn.innerText = "辦理加值";
                btn.onclick = () => { closeModal('smartModal'); openWizard('add', u.id); };
            } else if (u.nearest) {
                box.style.background = "#fef2f2"; box.style.borderColor = "#fecaca";
                box.innerHTML = `<b style="color:var(--red);">⚠️ 還款提醒：</b><br>項目: ${u.nearest.item}<br>剩餘需還: <b>$${u.nearest.rem}</b><br>期限: ${u.nearest.date}`;
                btn.innerText = "前往還款";
                btn.onclick = () => { closeModal('smartModal'); openWizard('pay', u.id); };
            } else {
                box.innerHTML = `✅ 客戶狀態良好，無待處理事項。`;
                btn.innerText = "查看完整功能";
                btn.onclick = () => closeModal('smartModal');
            }
            document.getElementById('smartModal').style.display = 'flex';
        }

        const FLOWS = {
            add: [{t:"加值金額",f:"amt",type:"number"},{t:"備註",f:"note",type:"text"}],
            sub: [{t:"扣款金額",f:"amt",type:"number"},{t:"備註",f:"note",type:"text"}],
            loan:[{t:"借款項目",f:"item",type:"text"},{t:"金額",f:"amt",type:"number"},{t:"期限",f:"date",type:"date"}],
            pay: [{t:"選擇借單",f:"loanId",type:"loan"},{t:"收現金額",f:"cash",type:"number"},{t:"扣點抵扣",f:"bal",type:"number"}],
            coupon:[{t:"券名",f:"name",type:"text"},{t:"內容",f:"desc",type:"text"},{t:"期限",f:"exp",type:"date"}]
        };

        // 啟動精靈
        function openWizard(mode, uid) {
            CUR_MODE = mode; CUR_STEP = 0; FORM = { uid: uid };
            document.getElementById('wizModal').style.display = 'flex';
            renderWiz();
        }

        function renderWiz() {
            const s = FLOWS[CUR_MODE][CUR_STEP];
            let html = `<h3>${s.t}</h3>`;
            if(s.type === 'loan') {
                // 自動過濾該會員的借單
                const u = U_DB.find(i => i.id === FORM.uid);
                html += `<select id="win" class="wiz-input">` + 
                        U_DB.find(i=>i.id===FORM.uid).nearest ? 
                        `<option value="AUTO">$${u.nearest.rem} (${u.nearest.item})</option>` : '' +
                        `</select><p>載入中...</p>`;
                // 這邊簡化邏輯，實際運作時會由後端 filter
            } else html += `<input type="${s.type}" id="win" class="wiz-input" autofocus>`;
            document.getElementById('wizBody').innerHTML = html;
            document.getElementById('wizNextBtn').innerText = (CUR_STEP === FLOWS[CUR_MODE].length-1) ? "確認提交" : "下一步";
        }

        function wizNext() {
            const input = document.getElementById('win');
            if(!input) return;
            FORM[FLOWS[CUR_MODE][CUR_STEP].f] = input.value;
            if(CUR_STEP < FLOWS[CUR_MODE].length - 1) { CUR_STEP++; renderWiz(); } 
            else submitFinal();
        }

        async function submitFinal() {
            document.getElementById('wizModal').style.display = 'none';
            document.getElementById('syncMask').style.display = 'flex';
            // 提交 API 請求至 GAS...
            location.reload();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
