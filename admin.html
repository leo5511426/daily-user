<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理後台 v22.0</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4f46e5; --dark: #0f172a; --bg: #f8fafc; --pink: #db2777; --orange: #f59e0b; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; font-weight: bold; }
        .dashboard { background: var(--dark); color: white; padding: 25px 20px; border-radius: 0 0 25px 25px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .menu-btn { background: white; padding: 18px 10px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; font-size: 14px; transition: 0.2s; }
        .full-btn { grid-column: span 2; background: var(--primary); color: white; border: none; font-size: 1.1rem; }
        .coupon-btn { background: var(--pink); color: white; border: none; }
        .issue-btn { background: var(--orange); color: white; border: none; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:5000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 92%; max-width: 400px; border-radius: 30px; padding: 25px; box-sizing: border-box; text-align: center; }
        .wiz-input { width: 100%; padding: 16px; font-size: 1.1rem; border-radius: 14px; border: 2px solid #e2e8f0; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        .btn-main { width: 100%; padding: 16px; border-radius: 14px; background: var(--primary); color: white; border: none; font-weight: bold; }
        .mask { display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>

    <div id="syncMask" class="mask"><div id="loaderText"><b>📡 正在同步資料...</b></div></div>

    <div class="dashboard">
        <h2 style="margin:0;">小佑管理工作台</h2>
        <p style="opacity:0.8; font-size:11px;">v22.0 發放/核銷全功能版</p>
    </div>

    <div class="menu-grid">
        <button class="menu-btn full-btn" onclick="startScan()">📷 啟動智能掃描</button>
        <div class="menu-btn" onclick="openWizard('add')">💰 加值點數</div>
        <div class="menu-btn" onclick="openWizard('sub')">🛒 扣款點數</div>
        <button class="menu-btn full-btn issue-btn" onclick="openWizard('issue')">🎁 發放新優惠券</button>
        <button class="menu-btn full-btn coupon-btn" onclick="openWizard('coupon')">🎫 核銷優惠券</button>
    </div>

    <div id="wizModal" class="modal">
        <div class="modal-content">
            <div id="wizBody"></div>
            <button class="btn-main" id="wizNextBtn" onclick="wizNext()">下一步</button>
            <p onclick="closeModal('wizModal')" style="color:#666; margin-top:20px; cursor:pointer;">取消操作</p>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwe_Qy-85bxYeU6heXJ6Auby_DZ-8OtPvbdSmjTRKrX53piQbHySlPG704Uw-5PR6o/exec"; 
        let U_DB = [], CP_DB = [], CUR_MODE = "", CUR_STEP = 0, FORM = {};

        window.onload = refreshData;

        async function refreshData() {
            try {
                const r = await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'fetchData', type:'users', uid:'ADMIN'})}).then(r=>r.json());
                U_DB = r.list;
                CP_DB = r.coupons;
                document.getElementById('syncMask').style.display = 'none';
            } catch(e) { alert("讀取失敗"); }
        }

        const FLOWS = {
            add: [{t:"選擇客戶",f:"uid",type:"user"},{t:"加值金額",f:"amt",type:"number"},{t:"備註",f:"note",type:"text"}],
            sub: [{t:"選擇客戶",f:"uid",type:"user"},{t:"扣款金額",f:"amt",type:"number"},{t:"備註",f:"note",type:"text"}],
            coupon: [{t:"選擇持有者",f:"uid",type:"user"},{t:"輸入或掃描券 ID",f:"couponId",type:"text"}],
            issue: [
                {t:"選擇發放對象",f:"uid",type:"user"},
                {t:"優惠券名稱",f:"title",type:"text"},
                {t:"優惠券內容/說明",f:"note",type:"text"},
                {t:"到期日(YYYY/MM/DD)",f:"expiry",type:"text"}
            ]
        };

        function openWizard(mode, uid) {
            CUR_MODE = mode; CUR_STEP = 0; FORM = uid ? { uid: uid } : {};
            if(uid && FLOWS[mode][0].f === "uid") CUR_STEP = 1;
            document.getElementById('wizModal').style.display = 'flex';
            renderWiz();
        }

        function renderWiz() {
            const s = FLOWS[CUR_MODE][CUR_STEP];
            let html = `<h3>${s.t}</h3>`;
            if(s.type === 'user') {
                html += `<select id="win" class="wiz-input">${U_DB.map(u=>`<option value="${u.id}">${u.name} (餘:${u.bal})</option>`).join('')}</select>`;
            } else {
                let placeholder = (s.f === 'expiry') ? "2026/12/31" : "請輸入...";
                html += `<input type="${s.type}" id="win" class="wiz-input" autofocus placeholder="${placeholder}">`;
            }
            document.getElementById('wizBody').innerHTML = html;
            document.getElementById('wizNextBtn').innerText = (CUR_STEP === FLOWS[CUR_MODE].length-1) ? "確認完成" : "下一步";
        }

        function wizNext() {
            const val = document.getElementById('win').value;
            FORM[FLOWS[CUR_MODE][CUR_STEP].f] = (FLOWS[CUR_MODE][CUR_STEP].type === "number") ? Number(val) : val;
            if(CUR_STEP < FLOWS[CUR_MODE].length - 1) { CUR_STEP++; renderWiz(); } else { submitFinal(); }
        }

        async function submitFinal() {
            document.getElementById('wizModal').style.display = 'none';
            document.getElementById('syncMask').style.display = 'flex';
            try {
                const b = { action: 'adminAction', ...FORM, type: CUR_MODE };
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(b) }).then(r => r.json());
                alert(res.message);
                location.reload();
            } catch (e) { alert("執行失敗"); document.getElementById('syncMask').style.display = 'none'; }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
