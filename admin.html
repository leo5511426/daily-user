<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POS 管理系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --main: #2c3e50; --accent: #FF8FA3; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; display: flex; height: 100vh; }
        .sidebar { width: 110px; background: var(--main); color: #fff; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .side-btn { background: none; border: 1px solid #fff; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 15px; width: 80%; cursor: pointer; }
        .work-area { flex: 1; padding: 25px; display: flex; flex-direction: column; }
        .hint { background: #333; color: #ffeb3b; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #fff; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border-bottom: 4px solid var(--accent); }
        #reader { width: 300px !important; margin: 0 auto; border-radius: 15px; overflow: hidden; border: 4px solid var(--accent); }
        #loading, #successPop { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <audio id="cashSound" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>
    <div id="loading"><h1>處理中...</h1></div>
    <div id="successPop">
        <div style="font-size:80px;">✅</div>
        <h1 id="popMsg" style="color:var(--main);">交易成功</h1>
        <p>視窗將於 2 秒後關閉</p>
    </div>

    <div class="sidebar">
        <button class="side-btn" onclick="location.reload()">選單</button>
        <button class="side-btn" onclick="location.href='/'">登出</button>
    </div>

    <div class="work-area">
        <div class="hint" id="hint">請選擇功能並準備掃描</div>
        <div id="menu" class="grid">
            <div class="card" onclick="startScan('add','加值')">加值 [+]</div>
            <div class="card" onclick="startScan('sub','扣款')">扣款 [-]</div>
            <div class="card" onclick="startScan('query','查詢')">會員查詢</div>
            <div class="card" onclick="addCoupon()">發放優惠券</div>
        </div>
        <div id="scanView" style="display:none; text-align:center;">
            <div id="reader"></div>
            <button class="side-btn" style="color:#000; border-color:#000; margin-top:20px;" onclick="location.reload()">取消</button>
        </div>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbwWc2God7js7OUsXiWkPqzDsrP4J2Re9kYHnAwBePj2GiecVBJlHI-YzhxXtOmvkqtd/exec";
        let mode = "";
        const scanner = new Html5Qrcode("reader");

        function startScan(m, t){
            mode = m; document.getElementById('hint').innerText = "掃描模式：" + t;
            document.getElementById('menu').style.display='none'; document.getElementById('scanView').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                scanner.stop(); doAction(txt);
            }).catch(err => { alert("相機啟動失敗，請確保使用 HTTPS 並授權權限"); location.reload(); });
        }

        async function doAction(val){
            let uid=val, amt=0;
            if(val.includes('|')){ const p=val.split('|'); uid=p[1]; amt=p[2]; }
            if(mode!=='query' && !amt) amt=prompt("金額："); // 後台暫留此處便於操作
            
            document.getElementById('loading').style.display='flex';
            const res=await fetch(GAS,{method:'POST',body:JSON.stringify({action:'adminAction',uid,amount:mode==='sub'?-amt:amt,desc:'POS_'+mode,adminName:'櫃員'})}).then(r=>r.json());
            document.getElementById('loading').style.display='none';
            
            if(res.success){
                document.getElementById('cashSound').play();
                document.getElementById('popMsg').innerText = "交易完成！\n新餘額：$" + res.message;
                document.getElementById('successPop').style.display='flex';
                setTimeout(()=>location.reload(), 2000);
            } else alert(res.message);
        }
    </script>
</body>
</html>
