<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小佑系統 - 管理後台</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .admin-card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { border-left: 5px solid #FF8FA3; padding-left: 15px; margin-bottom: 25px; font-size: 22px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #FF8FA3; box-shadow: 0 0 5px rgba(255,143,163,0.3); }
        .btn-submit { width: 100%; padding: 16px; background: #FF8FA3; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:active { transform: scale(0.98); background: #ff758f; }
        .hint { font-size: 12px; color: #999; margin-top: 4px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>新增借款項目</h2>
    
    <div class="form-group">
        <label>對象 ID (如: user04)</label>
        <input type="text" id="loan_uid" placeholder="輸入用戶編號">
    </div>

    <div class="form-group">
        <label>項目名稱</label>
        <input type="text" id="loan_item" placeholder="如: 蝦皮訂單、午餐墊付">
    </div>

    <div class="form-group">
        <label>借款本金</label>
        <input type="number" id="loan_total" placeholder="輸入整數金額">
    </div>

    <div class="form-group">
        <label>借款日期</label>
        <input type="date" id="loan_start"> <div class="hint">預設為今天</div>
    </div>

    <div class="form-group">
        <label>還款期限</label>
        <input type="date" id="loan_expiry"> <div class="hint">超過此日期將自動產生罰金</div>
    </div>

    <button class="btn-submit" onclick="submitLoan()">確認發放借款</button>
</div>

<script>
    // 重要：請在此處填寫你的 GAS 部署網址
    const GAS = "https://script.google.com/macros/s/AKfycbzDV8UV6Nj2JMczwe52jgeFKD2sfX42xreJA3XwMGnlVtWXRacLXh3v-tieCQIF2uOe/exec";

    // 頁面載入時自動設定今日日期
    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('loan_start').value = today;
    };

    async function submitLoan() {
        const data = {
            uid: document.getElementById('loan_uid').value.trim(),
            item: document.getElementById('loan_item').value.trim(),
            total: document.getElementById('loan_total').value,
            loanDate: document.getElementById('loan_start').value,
            expiry: document.getElementById('loan_expiry').value,
        };

        // 基本防呆檢查
        if(!data.uid || !data.item || !data.total || !data.expiry) {
            alert("⚠️ 請檢查欄位是否填寫完整！");
            return;
        }

        if(!confirm(`確認新增借款？\n對象：${data.uid}\n金額：$${data.total}\n期限：${data.expiry}`)) return;

        try {
            // 發送請求至 GAS 後端
            const res = await fetch(GAS, {
                method: 'POST',
                body: JSON.stringify({ action: 'addLoan', data: data })
            }).then(r => r.json());

            if(res.success) {
                alert("✅ 借款已成功寫入試算表！");
                // 清空部分輸入欄位，方便下一筆輸入
                document.getElementById('loan_uid').value = "";
                document.getElementById('loan_item').value = "";
                document.getElementById('loan_total').value = "";
            } else {
                alert("❌ 失敗：" + res.message);
            }
        } catch(e) {
            alert("連線發生異常，請確認 GAS 網址是否正確並已部署為『任何人』可存取。");
        }
    }
</script>

</body>
</html>
