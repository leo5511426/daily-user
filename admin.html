<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - v33.1</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { border-left: 5px solid #FF8FA3; padding-left: 10px; color: #333; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #777; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: #FF8FA3; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <h2>新增借款/紀錄</h2>
    
    <div class="field">
        <label>使用者 ID</label>
        <input type="text" id="uid" placeholder="例如: user01">
    </div>

    <div class="field">
        <label>項目名稱</label>
        <input type="text" id="item" placeholder="例如: 午餐墊付">
    </div>

    <div class="field">
        <label>本金金額</label>
        <input type="number" id="total" placeholder="100">
    </div>

    <div class="field">
        <label>借款日期</label>
        <input type="date" id="loanDate">
    </div>

    <div class="field">
        <label>還款期限 (逾期開始算罰金)</label>
        <input type="date" id="expiry">
    </div>

    <button class="btn" onclick="send()">確認新增項目</button>
</div>

<script>
    const GAS = "https://script.google.com/macros/s/AKfycbxffqGdI6DqehqreWQQKUNnjw9GeF99xRko85NRiAbMuYB2Eh9es8hTy2BxLi6i2qss/exec";

    // 預設今日日期
    window.onload = () => {
        const now = new Date().toISOString().split('T')[0];
        document.getElementById('loanDate').value = now;
    };

    async function send() {
        const data = {
            uid: document.getElementById('uid').value.trim(),
            item: document.getElementById('item').value.trim(),
            total: document.getElementById('total').value,
            loanDate: document.getElementById('loanDate').value,
            expiry: document.getElementById('expiry').value
        };

        if(!data.uid || !data.item || !data.total || !data.expiry) return alert("請填寫完整資訊！");

        if(!confirm(`確認新增一筆 $${data.total} 給 ${data.uid}？`)) return;

        try {
            const res = await fetch(GAS, {
                method: 'POST',
                body: JSON.stringify({ action: 'addLoan', data: data })
            }).then(r => r.json());

            if(res.success) {
                alert(res.message);
                location.reload();
            } else {
                alert("錯誤：" + res.message);
            }
        } catch(e) {
            alert("網路錯誤或 GAS 網址不正確");
        }
    }
</script>
</body>
</html>
