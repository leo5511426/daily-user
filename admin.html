<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>小佑系統 - 管理後台</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; font-weight: bold; }
        .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #ccc; }
        .wallet { border-top-color: #3b82f6; } .loan { border-top-color: #10b981; } .coupon { border-top-color: #f59e0b; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #fff; }
        #loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="loading"><p>執行中...</p></div>

    <div class="card">
        <h3>📷 萬用掃描器</h3>
        <div id="qrDiv" style="width:100%; display:none; margin-bottom:10px;"></div>
        <button class="btn" style="background:#444;" onclick="startScan()">啟動相機掃描</button>
    </div>

    <div class="card wallet">
        <h3>💳 錢包作業</h3>
        <select id="tUser"><option value="">-- 選擇會員 --</option></select>
        <select id="tType"><option value="add">加值</option><option value="sub">扣款</option><option value="ref">退款</option></select>
        <input type="number" id="tAmt" placeholder="金額"><input type="text" id="tNote" placeholder="備註原因">
        <button class="btn" style="background:#3b82f6;" onclick="doWallet()">確認執行</button>
    </div>

    <div class="card loan">
        <h3>💰 借還款管理</h3>
        <select id="lUser"><option value="">-- 選擇會員 --</option></select>
        <input type="text" id="lItem" placeholder="項目"><input type="number" id="lAmt" placeholder="本金"><input type="date" id="lDeadline">
        <button class="btn" style="background:#10b981;" onclick="doLoan()">撥款</button>
        <hr style="margin:20px 0;">
        <select id="pLoan" onchange="autoFill()"><option value="">-- 選擇待還借單 --</option></select>
        <div style="background:#f0fdf4; padding:10px; border-radius:10px; margin:5px 0;">
            實收現金：<input type="number" id="pCash" oninput="recalc()">
            餘額抵充：<input type="number" id="pBal" readonly style="background:#eee;">
        </div>
        <button class="btn" style="background:#059669;" onclick="doPay()">完成還款</button>
    </div>

    <div class="card coupon">
        <h3>🎟️ 優惠券系統</h3>
        <select id="cUser"><option value="">-- 選擇收券人 --</option></select>
        <label><input type="checkbox" id="cAll"> 全體發送</label>
        <input type="text" id="cName" placeholder="券名"><input type="text" id="cDesc" placeholder="描述"><input type="text" id="cExp" placeholder="期限">
        <button class="btn" style="background:#f59e0b;" onclick="doCoupon()">送出優惠券</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbyuPeGpO4UY02q9zC1fjTZ6Ko3YVgVvuNwczjGbwNECSBqHAAzOHbwMTCoF5fQgxxyu/exec";
        const scanner = new Html5Qrcode("qrDiv");

        async function init() {
            const u = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:'ADMIN'})}).then(r=>r.json());
            u.list.forEach(i => {
                const opt = `<option value="${i.id}">${i.name}</option>`;
                document.getElementById('tUser').innerHTML += opt;
                document.getElementById('lUser').innerHTML += opt;
                document.getElementById('cUser').innerHTML += opt;
            });
            const l = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:'ADMIN_LIST'})}).then(r=>r.json());
            l.list.forEach(i => document.getElementById('pLoan').innerHTML += `<option value="${i.id}" data-uid="${i.uid}" data-rem="${i.remain}">${i.uid} | ${i.item}</option>`);
        }

        async function api(body) {
            document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify(body)}).then(r=>r.json());
            alert(res.message); location.reload();
        }

        function doWallet() { api({ action:'adminAction', type:tType.value, uid:tUser.value, amount:tAmt.value, note:tNote.value }); }
        function doLoan() { api({ action:'adminAction', type:'create_loan', uid:lUser.value, loanItem:lItem.value, amount:lAmt.value, deadline:lDeadline.value }); }
        function autoFill() { const opt = pLoan.selectedOptions[0]; if(opt.dataset.rem) { pCash.value = opt.dataset.rem; recalc(); } }
        function recalc() {
            const opt = pLoan.selectedOptions[0]; if(!opt.dataset.rem) return;
            const total = parseFloat(opt.dataset.rem), cash = parseFloat(pCash.value) || 0;
            document.getElementById('pBal').value = (cash < total) ? (total - cash).toFixed(0) : 0;
        }
        function doPay() {
            const opt = pLoan.selectedOptions[0];
            api({ action:'adminAction', type:'pay_loan', loanId:opt.value, uid:opt.dataset.uid, cashPart:pCash.value, balPart:pBal.value });
        }
        function doCoupon() { api({ action:'adminAction', type:'send_coupon', all:cAll.checked, uid:cUser.value, cpName:cName.value, cpDesc:cDesc.value, cpExp:cExp.value }); }

        function startScan() {
            document.getElementById('qrDiv').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                if(txt.startsWith("CP|")) {
                    api({ action:'adminAction', type:'use_coupon', cpId: txt.split('|')[1] });
                } else {
                    tUser.value = txt; lUser.value = txt; cUser.value = txt;
                    alert("會員載入成功: " + txt);
                }
                scanner.stop(); document.getElementById('qrDiv').style.display='none';
            });
        }
        init();
    </script>
</body>
</html>
