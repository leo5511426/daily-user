<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理後台 v12.9.2</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; font-weight: bold; }
        .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #ccc; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #fff; }
        
        /* 遮罩層樣式 */
        .mask-full { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .mask-half { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.6); z-index:9998; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .info-text { font-size: 12px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="mFull" class="mask-full"><div class="spinner"></div><p>系統處理中，請稍後...</p></div>
    <div id="mHalf" class="mask-half"><div class="spinner"></div><p>系統資料同步處理中，請稍後...</p></div>

    <div class="card">
        <h3>📷 萬用掃描器</h3>
        <div id="qrDiv" style="width:100%; display:none; margin-bottom:10px;"></div>
        <button class="btn" style="background:#444;" onclick="startScan()">啟動相機掃描</button>
    </div>

    <div class="card" style="border-top-color: #3b82f6;">
        <h3>💳 錢包作業</h3>
        <select id="tUser"><option value="">-- 選擇會員 --</option></select>
        <select id="tType">
            <option value="add">加值 (增加餘額)</option>
            <option value="sub">扣款 (減少餘額)</option>
            <option value="ref">退款</option>
        </select>
        <input type="number" id="tAmt" placeholder="金額">
        <input type="text" id="tNote" placeholder="備註原因">
        <button class="btn" style="background:#3b82f6;" onclick="doWallet()">確認執行</button>
    </div>

    <div class="card" style="border-top-color: #10b981;">
        <h3>💰 借還款管理 (支持部分還款)</h3>
        <p class="info-text">【撥款作業】</p>
        <select id="lUser"><option value="">-- 選擇會員 --</option></select>
        <input type="text" id="lItem" placeholder="借款項目 (如: 午餐費)">
        <input type="number" id="lAmt" placeholder="借款本金">
        <input type="date" id="lDeadline">
        <button class="btn" style="background:#10b981;" onclick="doLoan()">確認撥款</button>
        
        <hr>
        
        <p class="info-text">【還款作業】*支持僅支付部分金額，未清餘額將持續計罰</p>
        <select id="pLoan" onchange="autoFill()"><option value="">-- 載入中... --</option></select>
        <input type="number" id="pCash" placeholder="本次收現金額" oninput="recalc()">
        <input type="number" id="pBal" placeholder="需由點數餘額抵扣 (選填)" value="0">
        <button class="btn" style="background:#059669;" onclick="doPay()">提交還款紀錄</button>
    </div>

    <div class="card" style="border-top-color: #f59e0b;">
        <h3>🎟️ 優惠券系統</h3>
        <select id="cUser"><option value="">-- 選擇收券人 --</option></select>
        <label style="font-size: 14px;"><input type="checkbox" id="cAll"> 全體發送</label>
        <input type="text" id="cName" placeholder="優惠券名稱">
        <input type="text" id="cDesc" placeholder="使用描述 (如: 兌換飲料一杯)">
        <input type="text" id="cExp" placeholder="到期日 (如: 2026/12/31)">
        <button class="btn" style="background:#f59e0b;" onclick="doCoupon()">送出優惠券</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbxhCaD2tuva3gwpQ46_9oCJewuH2uEVcn6eoY3f391uAijUUxv-bnrbcB38leVGziP5/exec"; // <--- 請務必替換為您的 GAS 部署網址
        const scanner = new Html5Qrcode("qrDiv");
        const mFull = document.getElementById('mFull'), mHalf = document.getElementById('mHalf');

        // 初始化資料 (載入會員與借單)
        async function init() {
            mHalf.style.display='flex';
            try {
                // 載入會員列表
                const u = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:'ADMIN'})}).then(r=>r.json());
                const userSelectors = document.querySelectorAll('#tUser, #lUser, #cUser');
                u.list.forEach(i => { 
                    userSelectors.forEach(s => s.innerHTML += `<option value="${i.id}">${i.name} ($${i.bal})</option>`); 
                });

                // 載入待還借單
                const l = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:'ADMIN_LIST'})}).then(r=>r.json());
                const loanSelector = document.getElementById('pLoan');
                loanSelector.innerHTML = '<option value="">-- 選擇待還借單 --</option>';
                l.list.forEach(i => {
                    // i.id 此時已經是數位化毫秒字串，保證匹配
                    loanSelector.innerHTML += `<option value="${i.id}" data-uid="${i.uid}" data-rem="${i.remain}">${i.uid} | ${i.item} (剩$${i.remain})</option>`;
                });
            } catch (e) {
                alert("初始化失敗，請檢查網路或 GAS 網址是否正確。");
            }
            mHalf.style.display='none';
        }

        // 萬用 API 呼叫
        async function api(body) {
            mFull.style.display='flex';
            try {
                const res = await fetch(GAS,{method:'POST',body:JSON.stringify(body)}).then(r=>r.json());
                alert(res.message); 
                if(res.success) location.reload();
            } catch (e) {
                alert("伺服器回應錯誤: " + e);
            }
            mFull.style.display='none';
        }

        // 錢包作業
        function doWallet() { 
            if(!tUser.value || !tAmt.value) return alert("請填寫會員與金額");
            api({ action:'adminAction', type:tType.value, uid:tUser.value, amount:tAmt.value, note:tNote.value }); 
        }

        // 撥款作業
        function doLoan() { 
            if(!lUser.value || !lAmt.value || !lDeadline.value) return alert("請填寫完整撥款資訊");
            api({ action:'adminAction', type:'create_loan', uid:lUser.value, loanItem:lItem.value, amount:lAmt.value, deadline:lDeadline.value }); 
        }

        // 還款自動填寫金額
        function autoFill() { 
            const opt = pLoan.selectedOptions[0]; 
            if(opt && opt.dataset.rem) { 
                pCash.value = opt.dataset.rem; 
                pBal.value = 0; // 預設只收現金，不扣點
            } 
        }

        // 提交還款
        function doPay() { 
            const opt = pLoan.selectedOptions[0]; 
            if(!opt || !opt.value) return alert("請選擇借單");
            api({ 
                action:'adminAction', 
                type:'pay_loan', 
                loanId: opt.value, 
                uid: opt.dataset.uid, 
                cashPart: document.getElementById('pCash').value || 0, 
                balPart: document.getElementById('pBal').value || 0 
            }); 
        }

        // 發送優惠券
        function doCoupon() { 
            if(!cAll.checked && !cUser.value) return alert("請選擇收券人");
            api({ action:'adminAction', type:'send_coupon', all:cAll.checked, uid:cUser.value, cpName:cName.value, cpDesc:cDesc.value, cpExp:cExp.value }); 
        }

        // 掃描器邏輯
        function startScan() {
            document.getElementById('qrDiv').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                if(txt.startsWith("CP|")) { 
                    api({ action:'adminAction', type:'use_coupon', cpId: txt.split('|')[1] }); 
                } else { 
                    // 掃描後嘗試匹配所有會員選單
                    const found = document.querySelector(`#tUser option[value="${txt}"]`);
                    if(found) {
                        document.querySelectorAll('#tUser, #lUser, #cUser').forEach(s => s.value = txt); 
                        alert("已選取會員: " + found.text); 
                    } else {
                        alert("掃描結果: " + txt + " (未能在會員清單中找到匹配ID)");
                    }
                }
                scanner.stop(); 
                document.getElementById('qrDiv').style.display='none';
            });
        }

        init();
    </script>
</body>
</html>
