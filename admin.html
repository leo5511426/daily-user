<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>旗艦管理後台 v9.8</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; font-weight: bold; }
        .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #ddd; }
        .s-wallet { border-top-color: #3b82f6; }
        .s-loan { border-top-color: #10b981; }
        .s-coupon { border-top-color: #f59e0b; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; color: #fff; font-size: 16px; }
        .pay-info { background: #f0fdf4; padding: 15px; border-radius: 10px; border: 1px dashed #10b981; margin: 10px 0; }
        #loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="loading"><p>⌛ 處理中，請稍後...</p></div>

    <div class="card s-wallet">
        <h3 style="color:#3b82f6; margin-top:0;">💳 錢包管理 (加/扣/退)</h3>
        <select id="tUser"><option value="">-- 選擇會員 --</option></select>
        <select id="tType">
            <option value="add">➕ 帳戶加值 (現金入帳)</option>
            <option value="sub">➖ 帳戶扣款 (餘額消費)</option>
            <option value="ref">🔄 系統退款 (補回餘額)</option>
        </select>
        <input type="number" id="tAmt" placeholder="輸入金額">
        <input type="text" id="tNote" placeholder="備註原因 (必填)">
        <button class="btn" style="background:#3b82f6;" onclick="doWallet()">確認執行錢包異動</button>
    </div>

    <div class="card s-loan">
        <h3 style="color:#10b981; margin-top:0;">💰 借貸中心 (借款/還款)</h3>
        <p style="background:#f8fafc; padding:8px; border-radius:5px;">Step 1: 撥付借款</p>
        <select id="lUser"><option value="">-- 選擇借款對象 --</option></select>
        <input type="text" id="lItem" placeholder="借款名目">
        <input type="number" id="lAmt" placeholder="借款金額">
        <input type="date" id="lDeadline">
        <button class="btn" style="background:#10b981;" onclick="doLoan()">發起借款單</button>
        
        <hr style="margin:20px 0; border:0.5px solid #eee;">
        
        <p style="background:#f8fafc; padding:8px; border-radius:5px;">Step 2: 還款沖帳 (支援混合支付)</p>
        <select id="pLoan" onchange="autoFillPay()"><option value="">-- 選擇待還款項 --</option></select>
        <div class="pay-info">
            <label>💵 實收現金：</label>
            <input type="number" id="pCash" oninput="recalcPay()">
            <label>💳 餘額扣除 (系統自動補足)：</label>
            <input type="number" id="pBal" readonly style="background:#eee; color:#d63384;">
            <p style="text-align:right; margin:5px 0 0; color:#10b981;">本次沖帳總額：$ <span id="pTotal">0</span></p>
        </div>
        <button class="btn" style="background:#059669;" onclick="doPay()">確認還款結帳</button>
    </div>

    <div class="card s-coupon">
        <h3 style="color:#f59e0b; margin-top:0;">🎟️ 優惠券與掃描</h3>
        <input type="text" id="cpName" placeholder="優惠券名稱">
        <input type="text" id="cpExp" placeholder="期限 (2026/12/31)">
        <label><input type="checkbox" id="cpAll"> 發送給全體成員</label>
        <button class="btn" style="background:#f59e0b;" onclick="doCoupon()">批次送出優惠券</button>
        <hr>
        <div id="qrDiv" style="width:100%; display:none; margin-bottom:10px;"></div>
        <button class="btn" style="background:#444;" onclick="startScan()">啟動相機掃描</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbwL0ddwIyGAy0j-JG4srdwG_NmgH9LGWnVokqFNuBd7PJiSL3uCULAdAnnE-XoaJJjn/exec";
        const scanner = new Html5Qrcode("qrDiv");

        async function init() {
            const u = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:'ADMIN'})}).then(r=>r.json());
            u.list.forEach(i => {
                document.getElementById('tUser').innerHTML += `<option value="${i.id}">${i.name}</option>`;
                document.getElementById('lUser').innerHTML += `<option value="${i.id}">${i.name}</option>`;
            });
            const l = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:'ADMIN_LIST'})}).then(r=>r.json());
            l.list.forEach(i => document.getElementById('pLoan').innerHTML += `<option value="${i.id}" data-uid="${i.uid}" data-rem="${i.remain}">${i.uid} | ${i.item} (欠$${i.remain})</option>`);
        }

        async function api(body) {
            document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify(body)}).then(r=>r.json());
            alert(res.message); location.reload();
        }

        function doWallet() { 
            if(!tAmt.value || !tNote.value) return alert("請填寫金額與備註");
            api({ action:'adminAction', type:tType.value, uid:tUser.value, amount:tAmt.value, note:tNote.value }); 
        }
        
        function doLoan() { api({ action:'adminAction', type:'create_loan', uid:lUser.value, loanItem:lItem.value, amount:lAmt.value, deadline:lDeadline.value }); }

        function autoFillPay() {
            const opt = pLoan.selectedOptions[0];
            if(opt.dataset.rem) { pCash.value = opt.dataset.rem; recalcPay(); }
        }

        function recalcPay() {
            const opt = pLoan.selectedOptions[0];
            if(!opt.dataset.rem) return;
            const total = parseFloat(opt.dataset.rem);
            const cash = parseFloat(pCash.value) || 0;
            const bal = (cash < total) ? total - cash : 0;
            document.getElementById('pBal').value = bal.toFixed(0);
            document.getElementById('pTotal').innerText = (cash + bal).toFixed(0);
        }

        function doPay() {
            const opt = pLoan.selectedOptions[0];
            api({ action:'adminAction', type:'pay_loan', loanId:opt.value, uid:opt.dataset.uid, cashPart:pCash.value, balPart:pBal.value });
        }

        function doCoupon() { api({ action:'adminAction', type:'send_coupon', all:cpAll.checked, cpName:cpName.value, cpExp:cpExp.value }); }

        function startScan() {
            document.getElementById('qrDiv').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                if(txt.startsWith("USE_CP|")) api({ action:'adminAction', type:'use_coupon', cpId:txt.split('|')[1] });
                else document.getElementById('tUser').value = txt;
                scanner.stop();
            });
        }
        init();
    </script>
</body>
</html>
