<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>後台管理 v12.9</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; font-weight: bold; }
        .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #ccc; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #fff; }
        .mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading" class="mask"><div class="spinner"></div><p>處理中...</p></div>

    <div class="card" style="border-top-color: #3b82f6;">
        <h3>💳 錢包作業</h3>
        <select id="tUser"><option value="">-- 選擇會員 --</option></select>
        <select id="tType"><option value="add">加值</option><option value="sub">扣款</option></select>
        <input type="number" id="tAmt" placeholder="金額">
        <button class="btn" style="background:#3b82f6;" onclick="doWallet()">確認</button>
    </div>

    <div class="card" style="border-top-color: #10b981;">
        <h3>💰 借還款與部分還款</h3>
        <select id="pLoan" onchange="autoFill()"><option value="">-- 選擇待還借單 --</option></select>
        <p style="font-size:12px; color:#666;">* 輸入本次實際收到的金額，若不夠還清，罰金將繼續計算。</p>
        <input type="number" id="pCash" placeholder="本次收現金額">
        <input type="number" id="pBal" placeholder="需由餘額抵扣金額 (選填)" value="0">
        <button class="btn" style="background:#059669;" onclick="doPay()">提交還款</button>
    </div>

    <div class="card" style="border-top-color: #f59e0b;">
        <h3>🎟️ 優惠券發送</h3>
        <select id="cUser"><option value="">-- 選擇會員 --</option></select>
        <input type="text" id="cName" placeholder="券名">
        <button class="btn" style="background:#f59e0b;" onclick="doCoupon()">發送</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbyomoOmzCXe9Q_gMrlMN3pvVaL41G143g6ujxfVSrbubyvg9fAgX3xHq1akjrDcDiZ5/exec";
        let userBals = {};

        async function init() {
            document.getElementById('loading').style.display='flex';
            const u = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:'ADMIN'})}).then(r=>r.json());
            u.list.forEach(i => { 
                userBals[i.id] = i.bal;
                document.querySelectorAll('#tUser, #cUser').forEach(s => s.innerHTML += `<option value="${i.id}">${i.name} ($${i.bal})</option>`); 
            });
            const l = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:'ADMIN_LIST'})}).then(r=>r.json());
            l.list.forEach(i => document.getElementById('pLoan').innerHTML += `<option value="${i.id}" data-uid="${i.uid}" data-rem="${i.remain}">${i.uid} | ${i.item} (尚欠$${i.remain})</option>`);
            document.getElementById('loading').style.display='none';
        }

        function autoFill() {
            const opt = document.getElementById('pLoan').selectedOptions[0];
            if(opt.dataset.rem) document.getElementById('pCash').value = opt.dataset.rem;
        }

        async function doPay() {
            const opt = document.getElementById('pLoan').selectedOptions[0];
            const cash = parseFloat(document.getElementById('pCash').value) || 0;
            const bal = parseFloat(document.getElementById('pBal').value) || 0;
            if (bal > userBals[opt.dataset.uid]) return alert("會員餘額不足抵扣！");
            
            document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'adminAction',type:'pay_loan',loanId:opt.value,uid:opt.dataset.uid,cashPart:cash,balPart:bal})}).then(r=>r.json());
            alert(res.message); location.reload();
        }

        async function doWallet() {
            document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'adminAction',type:document.getElementById('tType').value,uid:document.getElementById('tUser').value,amount:document.getElementById('tAmt').value})}).then(r=>r.json());
            alert(res.message); location.reload();
        }

        init();
    </script>
</body>
</html>
