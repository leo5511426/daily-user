<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>後台管理 v12.9.1</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; font-weight: bold; }
        .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #ccc; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #fff; background:#059669; }
        .mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading" class="mask"><div class="spinner"></div><p>處理中...</p></div>

    <div class="card" style="border-top-color: #10b981;">
        <h3>💰 借還款作業 (支持部分還款)</h3>
        <select id="pLoan" onchange="autoFill()"><option value="">-- 載入中... --</option></select>
        <input type="number" id="pCash" placeholder="本次收現金額">
        <input type="number" id="pBal" placeholder="抵扣餘額" value="0">
        <button class="btn" onclick="doPay()">提交還款作業</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbxhCaD2tuva3gwpQ46_9oCJewuH2uEVcn6eoY3f391uAijUUxv-bnrbcB38leVGziP5/exec";

        async function init() {
            document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:'ADMIN_LIST'})}).then(r=>r.json());
            const sel = document.getElementById('pLoan');
            sel.innerHTML = '<option value="">-- 選擇借單 --</option>';
            res.list.forEach(i => {
                sel.innerHTML += `<option value="${i.id}" data-uid="${i.uid}" data-rem="${i.remain}">${i.uid} | ${i.item} (剩$${i.remain})</option>`;
            });
            document.getElementById('loading').style.display='none';
        }

        function autoFill() {
            const opt = document.getElementById('pLoan').selectedOptions[0];
            if(opt && opt.dataset.rem) document.getElementById('pCash').value = opt.dataset.rem;
        }

        async function doPay() {
            const opt = document.getElementById('pLoan').selectedOptions[0];
            if(!opt.value) return alert("請選擇借單");
            
            document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({
                action:'adminAction',
                type:'pay_loan',
                loanId: opt.value, 
                uid: opt.dataset.uid,
                cashPart: document.getElementById('pCash').value,
                balPart: document.getElementById('pBal').value
            })}).then(r=>r.json());
            
            alert(res.message);
            location.reload();
        }

        init();
    </script>
</body>
</html>
