<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑行動服務 | 智能管理台 v15.0</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #4f46e5; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --dark: #0f172a; --bg: #f8fafc; --card: #ffffff;
        }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); margin: 0; color: var(--dark); -webkit-tap-highlight-color: transparent; }

        /* 頂部數據看板 */
        .header { background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); color: white; padding: 30px 20px; border-radius: 0 0 30px 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .sync-info { font-size: 11px; background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 10px; }
        .dashboard-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 5px; }
        .stat-item span { font-size: 12px; opacity: 0.7; display: block; }
        .stat-item b { font-size: 1.4rem; color: var(--warning); }

        /* 功能網格按鈕 */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .grid-btn { 
            background: var(--card); padding: 25px 15px; border-radius: 24px; text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.06);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.03);
        }
        .grid-btn:active { transform: scale(0.92); background: #f1f5f9; }
        .btn-icon { font-size: 32px; display: block; margin-bottom: 10px; }
        .btn-label { font-weight: 700; font-size: 14px; color: #334155; }
        .full-width { grid-column: span 2; background: var(--primary); color: white; }
        .full-width .btn-label { color: white; }

        /* 智能會員卡片彈窗 */
        .modal { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(15,23,42,0.6); z-index:2000; backdrop-filter: blur(5px);
            align-items: flex-end;
        }
        .modal-content { 
            background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 30px 20px;
            box-sizing: border-box; animation: slideUp 0.3s ease-out; max-height: 90vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .user-header { text-align: center; margin-bottom: 25px; }
        .user-avatar { width: 60px; height: 60px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 10px; }
        .user-balance { background: #f1f5f9; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .debt-card { background: #fff1f2; border: 1px solid #fecaca; padding: 15px; border-radius: 20px; color: var(--danger); margin-bottom: 20px; }

        /* 導引輸入框 */
        .wiz-step { display: none; }
        .wiz-step.active { display: block; }
        .wiz-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; color: var(--dark); }
        .wiz-input { width: 100%; padding: 18px; font-size: 1.2rem; border-radius: 16px; border: 2px solid #e2e8f0; background: #f8fafc; box-sizing: border-box; margin-bottom: 20px; }

        /* 底部按鈕區 */
        .btn-group { display: flex; gap: 10px; }
        .btn-main { flex: 2; padding: 18px; border-radius: 16px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; background: var(--primary); color: white; }
        .btn-sec { flex: 1; background: #f1f5f9; color: #64748b; padding: 18px; border-radius: 16px; border: none; font-weight: bold; }

        /* 加載遮罩 */
        .loader-mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; justify-content:center; align-items:center; flex-direction:column; }
    </style>
</head>
<body>

    <div id="loader" class="loader-mask">
        <div style="border:4px solid #f3f3f3; border-top:4px solid var(--primary); border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite;"></div>
        <p id="loadMsg" style="margin-top:15px; font-weight:bold; color:var(--dark);">正在同步雲端資料...</p>
    </div>

    <div class="header">
        <div class="sync-info" id="syncTag">🔄 等待同步...</div>
        <div class="dashboard-stats">
            <div class="stat-item"><span>會員總點數</span><b id="statBal">$0</b></div>
            <div class="stat-item"><span>待收回總額</span><b id="statLoans">$0</b></div>
        </div>
    </div>

    <div class="grid-container">
        <div class="grid-btn full-width" onclick="startScan()">
            <span class="btn-icon">📷</span><span class="btn-label">掃描條碼 (智慧識別)</span>
        </div>
        <div class="grid-btn" onclick="openWizard('add')"><span class="btn-icon">💰</span><span class="btn-label">存入點數</span></div>
        <div class="grid-btn" onclick="openWizard('sub')"><span class="btn-icon">🛒</span><span class="btn-label">點數扣款</span></div>
        <div class="grid-btn" onclick="openWizard('loan')"><span class="btn-icon">🏦</span><span class="btn-label">執行撥款</span></div>
        <div class="grid-btn" onclick="openWizard('pay')"><span class="btn-icon">🤝</span><span class="btn-label">還款作業</span></div>
        <div class="grid-btn" onclick="openWizard('coupon')"><span class="btn-icon">🎟️</span><span class="btn-label">發送禮券</span></div>
        <div class="grid-btn" onclick="location.reload()"><span class="btn-icon">🔄</span><span class="btn-label">手動刷新</span></div>
    </div>

    <div id="qrArea" style="display:none; padding:0 20px;"><div id="qrDiv" style="border-radius:20px; overflow:hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1);"></div></div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="user-header">
                <div class="user-avatar">👤</div>
                <div style="font-size:1.5rem; font-weight:800;" id="mName">---</div>
                <div style="color:#64748b; font-size:0.9rem;" id="mId">ID: ---</div>
            </div>
            <div class="user-balance">
                <small style="color:#64748b;">當前可用點數</small>
                <div style="font-size:1.8rem; font-weight:800; color:var(--primary);" id="mBal">$0</div>
            </div>
            <div id="mDebtArea" class="debt-card" style="display:none;">
                <div style="font-weight:800; margin-bottom:5px;">⚠️ 待處理借單</div>
                <div id="mDebtList" style="font-size:13px;"></div>
            </div>
            <div class="btn-group">
                <button class="btn-sec" onclick="closeModal()">關閉</button>
                <button class="btn-main" id="mActionBtn" onclick="goQuickPay()">快速處理</button>
            </div>
        </div>
    </div>

    <div id="wizModal" class="modal">
        <div class="modal-content" style="padding-bottom:50px;">
            <div id="wizContainer"></div>
            <div class="btn-group">
                <button class="btn-sec" onclick="closeWiz()">取消</button>
                <button class="btn-main" id="wizNextBtn" onclick="wizNext()">下一步</button>
            </div>
        </div>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbwm8IJGX_r1c_yU1Udk4kcO3QFuoWGxsL0qPeEyv2qx-yRISy2_96h5XMfiNkJxbUP0/exec";
        const scanner = new Html5Qrcode("qrDiv");
        let U_DB = [], L_DB = [], CUR_U = null, CUR_MODE = "", CUR_STEP = 0, FORM = {};

        // 啟動即同步
        window.onload = async () => {
            document.getElementById('loader').style.display = 'flex';
            try {
                const [ur, lr] = await Promise.all([
                    fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:'ADMIN'})}).then(r=>r.json()),
                    fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:'ADMIN_LIST'})}).then(r=>r.json())
                ]);
                U_DB = ur.list; L_DB = lr.list;
                document.getElementById('statBal').innerText = "$" + U_DB.reduce((a,b)=>a+parseFloat(b.bal),0).toLocaleString();
                document.getElementById('statLoans').innerText = "$" + L_DB.reduce((a,b)=>a+b.remain,0).toLocaleString();
                document.getElementById('syncTag').innerText = "✅ 已同步資料: " + new Date().toLocaleTimeString();
            } catch(e) { alert("同步失敗，請檢查網路"); }
            document.getElementById('loader').style.display = 'none';
        };

        // 掃描識別
        function startScan() {
            document.getElementById('qrArea').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                scanner.stop(); document.getElementById('qrArea').style.display='none';
                const u = U_DB.find(i => String(i.id) === String(txt));
                if(u) showUser(u); else alert("找不到會員: " + txt);
            });
        }

        function showUser(u) {
            CUR_U = u;
            document.getElementById('mName').innerText = u.name;
            document.getElementById('mId').innerText = "ID: " + u.id;
            document.getElementById('mBal').innerText = "$" + u.bal;
            const debts = L_DB.filter(l => String(l.uid) === String(u.id));
            const area = document.getElementById('mDebtArea');
            if(debts.length > 0) {
                area.style.display = 'block';
                document.getElementById('mDebtList').innerHTML = debts.map(d=>`• ${d.item} (欠$${d.remain})`).join('<br>');
                document.getElementById('mActionBtn').innerText = "處理還款作業";
                document.getElementById('mActionBtn').style.background = "var(--danger)";
            } else {
                area.style.display = 'none';
                document.getElementById('mActionBtn').innerText = "點數加值/扣款";
                document.getElementById('mActionBtn').style.background = "var(--primary)";
            }
            document.getElementById('userModal').style.display = 'flex';
        }

        // 快速導向
        function goQuickPay() {
            const debts = L_DB.filter(l => String(l.uid) === String(CUR_U.id));
            closeModal();
            openWizard(debts.length > 0 ? 'pay' : 'add', CUR_U.id);
        }

        // 導引邏輯
        const CONFIG = {
            add: [{t:"選擇會員", f:"uid", type:"u"}, {t:"存入金額", f:"amt", type:"number"}, {t:"備註", f:"note", type:"text"}],
            sub: [{t:"選擇會員", f:"uid", type:"u"}, {t:"扣除金額", f:"amt", type:"number"}, {t:"備註", f:"note", type:"text"}],
            loan: [{t:"借款人", f:"uid", type:"u"}, {t:"項目名稱", f:"item", type:"text"}, {t:"本金", f:"amt", type:"number"}, {t:"期限", f:"date", type:"date"}],
            pay: [{t:"選擇借單", f:"loanId", type:"l"}, {t:"實收現金", f:"cash", type:"number"}, {t:"抵扣點數", f:"bal", type:"number"}],
            coupon: [{t:"優惠券名稱", f:"name", type:"text"}, {t:"收券人", f:"uid", type:"u_all"}]
        };

        function openWizard(mode, preId) {
            CUR_MODE = mode; CUR_STEP = 0; FORM = preId ? {uid: preId} : {};
            document.getElementById('wizModal').style.display = 'flex';
            if(preId && CONFIG[mode][0].f === "uid") CUR_STEP = 1; 
            renderWiz();
        }

        function renderWiz() {
            const s = CONFIG[CUR_MODE][CUR_STEP];
            let html = `<div class="wiz-title">${s.t}</div>`;
            if(s.type === 'u') html += `<select id="win" class="wiz-input">${U_DB.map(u=>`<option value="${u.id}" ${FORM.uid==u.id?'selected':''}>${u.name}</option>`).join('')}</select>`;
            else if(s.type === 'u_all') html += `<select id="win" class="wiz-input"><option value="ALL">全體會員</option>${U_DB.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select>`;
            else if(s.type === 'l') {
                const ds = L_DB.filter(l => String(l.uid) === String(FORM.uid));
                html += `<select id="win" class="wiz-input">${ds.map(d=>`<option value="${d.id}" data-rem="${d.remain}">${d.item} ($${d.remain})</option>`).join('')}</select>`;
            }
            else html += `<input type="${s.type}" id="win" class="wiz-input" autofocus>`;
            document.getElementById('wizContainer').innerHTML = html;
            document.getElementById('wizNextBtn').innerText = (CUR_STEP === CONFIG[CUR_MODE].length-1) ? "確認完成" : "下一步";
        }

        function wizNext() {
            const input = document.getElementById('win');
            FORM[CONFIG[CUR_MODE][CUR_STEP].f] = input.value;
            if(CONFIG[CUR_MODE][CUR_STEP].type === 'l') {
                FORM.rem = input.selectedOptions[0].dataset.rem;
                setTimeout(() => { if(document.getElementById('win')) document.getElementById('win').value = FORM.rem; }, 50);
            }
            if(CUR_STEP < CONFIG[CUR_MODE].length - 1) { CUR_STEP++; renderWiz(); }
            else submit();
        }

        async function submit() {
            document.getElementById('wizModal').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loadMsg').innerText = "正在處理交易紀錄...";
            
            let b = { action: "adminAction" };
            if(['add','sub'].includes(CUR_MODE)) { b.type=CUR_MODE; b.uid=FORM.uid; b.amount=FORM.amt; b.note=FORM.note; }
            if(CUR_MODE === 'loan') { b.type="create_loan"; b.uid=FORM.uid; b.loanItem=FORM.item; b.amount=FORM.amt; b.deadline=FORM.date; }
            if(CUR_MODE === 'pay') { b.type="pay_loan"; b.loanId=FORM.loanId; b.uid=FORM.uid; b.cashPart=FORM.cash; b.balPart=FORM.bal; }
            if(CUR_MODE === 'coupon') { b.type="send_coupon"; b.all=(FORM.uid==="ALL"); b.uid=FORM.uid; b.cpName=FORM.name; b.cpDesc=""; b.cpExp=""; }

            const r = await fetch(GAS,{method:'POST',body:JSON.stringify(b)}).then(r=>r.json());
            alert(r.message); location.reload();
        }

        function closeModal() { document.getElementById('userModal').style.display = 'none'; }
        function closeWiz() { document.getElementById('wizModal').style.display = 'none'; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </script>
</body>
</html>
