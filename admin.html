<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑管理台 v19.5</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4f46e5; --dark: #0f172a; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        .dashboard { background: var(--dark); color: white; padding: 30px 20px; border-radius: 0 0 30px 30px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 25px; }
        .menu-btn { background: white; padding: 20px 10px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #e2e8f0; font-size: 15px; transition: 0.2s; }
        .menu-btn:active { transform: scale(0.95); background: #f8fafc; }
        .full-btn { grid-column: span 2; background: var(--primary); color: white; border: none; font-size: 1.1rem; font-weight: 900; }
        
        /* 彈窗樣式 */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:5000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 30px; padding: 25px; box-sizing: border-box; text-align: center; }
        .wiz-input { width: 100%; padding: 18px; font-size: 1.2rem; border-radius: 15px; border: 2px solid #e2e8f0; margin-bottom: 20px; box-sizing: border-box; outline: none; text-align: center; }
        
        /* 相機專用容器 */
        #qr-reader { width: 100%; min-height: 250px; background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 15px; border: 3px solid #4f46e5; }
        .mask { display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>

    <div id="syncMask" class="mask"><b>📡 雲端資料同步中...</b></div>

    <div class="dashboard">
        <h2 style="margin:0;">小佑管理工作台</h2>
        <p style="margin:5px 0 0; opacity:0.7; font-size:12px;">v19.5 數值安全穩定版</p>
    </div>

    <div class="menu-grid">
        <button class="menu-btn full-btn" onclick="startScan()">📷 啟動相機掃描</button>
        <div class="menu-btn" onclick="openWizard('add')">💰 點數加值</div>
        <div class="menu-btn" onclick="openWizard('sub')">🛒 點數扣款</div>
        <div class="menu-btn" style="grid-column: span 2; background:#64748b; color:white;" onclick="location.reload()">🔄 重新整理資料</div>
    </div>

    <div id="wizModal" class="modal">
        <div class="modal-content">
            <div id="wizBody"></div>
            <button class="menu-btn full-btn" onclick="wizNext()">下一步</button>
            <p onclick="closeModal('wizModal')" style="color:#94a3b8; margin-top:20px; cursor:pointer;">取消並返回</p>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content" style="padding:15px;">
            <h3 style="margin:10px 0;">請對準會員 QR Code</h3>
            <div id="qr-reader"></div>
            <button class="menu-btn full-btn" style="background:#ef4444;" onclick="closeQr()">關閉相機</button>
        </div>
    </div>

    <script>
        // 請確保此處為你的部署網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw6i4wAWBUYPjF20AKNydbRRKJxLj9G7upMB6PKiyerIc7-aK1579WDpARhbGxJ2POr/exec"; 
        let U_DB = [], CUR_MODE = "", CUR_STEP = 0, FORM = {}, html5QrCode = null;

        window.onload = refreshData;

        async function refreshData() {
            try {
                const r = await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'fetchData', type:'users', uid:'ADMIN'})}).then(r=>r.json());
                U_DB = r.list;
                document.getElementById('syncMask').style.display = 'none';
            } catch(e) { 
                document.getElementById('syncMask').innerHTML = "<b>連線失敗，請檢查網路或 GAS 權限</b>";
            }
        }

        // [相機修復邏輯]
        function startScan() {
            document.getElementById('qrModal').style.display = 'flex';
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("qr-reader");
            }
            
            const config = { fps: 15, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (txt) => { // 掃描成功
                    const u = U_DB.find(i => String(i.id).trim() === String(txt).trim());
                    if(u) {
                        html5QrCode.stop().then(() => {
                            document.getElementById('qrModal').style.display = 'none';
                            alert("已辨識用戶: " + u.name);
                            openWizard('add', u.id); // 掃完預設進入加值
                        });
                    }
                }
            ).catch(err => {
                alert("相機啟動失敗：請確保為 HTTPS 環境並允許權限");
                closeQr();
            });
        }

        function closeQr() {
            if(html5QrCode) {
                html5QrCode.stop().finally(() => {
                    document.getElementById('qrModal').style.display = 'none';
                });
            } else {
                document.getElementById('qrModal').style.display = 'none';
            }
        }

        const FLOWS = {
            add: [{t:"選擇客戶",f:"uid",type:"user"}, {t:"加值金額",f:"amt",type:"number"}, {t:"備註",f:"note",type:"text"}],
            sub: [{t:"選擇客戶",f:"uid",type:"user"}, {t:"扣款金額",f:"amt",type:"number"}, {t:"備註",f:"note",type:"text"}]
        };

        function openWizard(mode, uid) {
            CUR_MODE = mode; CUR_STEP = 0; 
            FORM = uid ? { uid: uid } : {};
            if(uid) CUR_STEP = 1; // 如果已經有 UID (掃描來的)，直接跳到金額
            document.getElementById('wizModal').style.display = 'flex';
            renderWiz();
        }

        function renderWiz() {
            const s = FLOWS[CUR_MODE][CUR_STEP];
            let html = `<h3>${s.t}</h3>`;
            if(s.type === 'user') {
                html += `<select id="win" class="wiz-input">${U_DB.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select>`;
            } else {
                html += `<input type="${s.type}" id="win" class="wiz-input" autofocus placeholder="請輸入...">`;
            }
            document.getElementById('wizBody').innerHTML = html;
        }

        function wizNext() {
            const input = document.getElementById('win');
            let val = input.value;
            
            // 強制數值轉換
            if (FLOWS[CUR_MODE][CUR_STEP].type === "number") {
                val = Number(val) || 0;
            }

            FORM[FLOWS[CUR_MODE][CUR_STEP].f] = val;
            
            if(CUR_STEP < FLOWS[CUR_MODE].length - 1) {
                CUR_STEP++; 
                renderWiz();
            } else {
                submitFinal();
            }
        }

        async function submitFinal() {
            if(!confirm("確定要提交這筆交易嗎？")) return;
            
            document.getElementById('wizModal').style.display = 'none';
            document.getElementById('syncMask').style.display = 'flex';
            
            // 如果是扣款，後端邏輯會處理，但前端先轉負數更直觀
            if(CUR_MODE === 'sub') FORM.amt = -Math.abs(FORM.amt);

            try {
                const r = await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'adminAction', ...FORM})}).then(r=>r.json());
                alert(r.message);
                location.reload();
            } catch(e) {
                alert("提交失敗");
                document.getElementById('syncMask').style.display = 'none';
            }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
