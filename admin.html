<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑管理後台 v19.2</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4f46e5; --dark: #0f172a; --bg: #f8fafc; --orange: #f59e0b; --red: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; font-weight: bold; }
        .dashboard { background: var(--dark); color: white; padding: 25px 20px; border-radius: 0 0 25px 25px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .menu-btn { background: white; padding: 18px 10px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; font-size: 14px; }
        .full-btn { grid-column: span 2; background: var(--primary); color: white; border: none; font-size: 1.1rem; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:5000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 92%; max-width: 400px; border-radius: 30px; padding: 25px; box-sizing: border-box; text-align: center; }
        .wiz-input { width: 100%; padding: 16px; font-size: 1.1rem; border-radius: 14px; border: 2px solid #e2e8f0; margin-bottom: 15px; box-sizing: border-box; }
        
        /* 相機容器 */
        #qr-reader { width: 100%; min-height: 250px; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        
        .mask { display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; flex-direction:column; justify-content:center; align-items:center; text-align: center; padding: 20px; }
        .btn-main { width: 100%; padding: 16px; border-radius: 14px; background: var(--primary); color: white; border: none; font-weight: bold; margin-top: 10px; }
        .btn-sec { width: 100%; padding: 12px; background: #f1f5f9; border: none; border-radius: 12px; margin-top: 10px; color: #64748b; }
    </style>
</head>
<body>

    <div id="syncMask" class="mask">
        <div id="loaderText"><b>📡 正在連接雲端資料庫...</b></div>
    </div>

    <div class="dashboard">
        <h2 style="margin:0;">小佑管理工作台</h2>
        <p style="margin:5px 0 0; opacity:0.8; font-size:12px;">v19.2 整合穩定版</p>
    </div>

    <div class="menu-grid">
        <button class="menu-btn full-btn" onclick="startScan()">📷 掃描會員 QR</button>
        <div class="menu-btn" onclick="openWizard('add')">💰 點數加值</div>
        <div class="menu-btn" onclick="openWizard('sub')">🛒 點數扣款</div>
        <div class="menu-btn" onclick="openWizard('loan')">🏦 借款撥款</div>
        <div class="menu-btn" onclick="openWizard('pay')">🤝 還款作業</div>
    </div>

    <div id="wizModal" class="modal">
        <div class="modal-content">
            <div id="wizBody"></div>
            <button class="btn-main" id="wizNextBtn" onclick="wizNext()">下一步</button>
            <button onclick="closeModal('wizModal')" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer;">取消</button>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">請對準用戶 QR</h3>
            <div id="qr-reader"></div>
            <button class="btn-sec" onclick="closeQr()">關閉相機</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw6i4wAWBUYPjF20AKNydbRRKJxLj9G7upMB6PKiyerIc7-aK1579WDpARhbGxJ2POr/exec"; 
        let U_DB = [], CUR_MODE = "", CUR_STEP = 0, FORM = {}, html5QrCode = null;

        window.onload = refreshData;

        async function refreshData() {
            const mask = document.getElementById('syncMask');
            const text = document.getElementById('loaderText');
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'fetchData', type: 'users', uid: 'ADMIN' })
                });
                if (!response.ok) throw new Error(`連線失敗 (HTTP ${response.status})`);
                const r = await response.json();
                if (!r.success) throw new Error(r.message);
                U_DB = r.list;
                mask.style.display = 'none';
            } catch (e) {
                text.innerHTML = `<b style="color:red;">❌ 同步失敗</b><br><small>${e.message}</small><br>
                                 <button class="btn-main" onclick="location.reload()">重新嘗試</button>`;
            }
        }

        // [核心修正：補全掃描函式]
        function startScan() {
            document.getElementById('qrModal').style.display = 'flex';
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("qr-reader");
            }
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (txt) => {
                    const u = U_DB.find(i => String(i.id).trim() === String(txt).trim());
                    if(u) {
                        closeQr();
                        alert("辨識成功: " + u.name);
                        openWizard('add', u.id); // 掃描後預設進入加值
                    }
                }
            ).catch(err => {
                alert("相機啟動失敗，請確認權限或 HTTPS 環境");
                closeQr();
            });
        }

        function closeQr() {
            if(html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('qrModal').style.display = 'none';
                });
            } else {
                document.getElementById('qrModal').style.display = 'none';
            }
        }

        const FLOWS = {
            add: [{t:"選擇客戶",f:"uid",type:"user"},{t:"加值金額",f:"amt",type:"number"},{t:"備註",f:"note",type:"text"}],
            sub: [{t:"選擇客戶",f:"uid",type:"user"},{t:"扣款金額",f:"amt",type:"number"},{t:"備註",f:"note",type:"text"}],
            loan:[{t:"選擇客戶",f:"uid",type:"user"},{t:"金額",f:"amt",type:"number"},{t:"項目",f:"note",type:"text"}],
            pay: [{t:"選擇客戶",f:"uid",type:"user"},{t:"收現金額",f:"cash",type:"number"},{t:"扣點金額",f:"bal",type:"number"}]
        };

        function openWizard(mode, uid) {
            CUR_MODE = mode; CUR_STEP = 0; FORM = uid ? { uid: uid } : {};
            if(uid && FLOWS[mode][0].f === "uid") CUR_STEP = 1;
            document.getElementById('wizModal').style.display = 'flex';
            renderWiz();
        }

        function renderWiz() {
            const s = FLOWS[CUR_MODE][CUR_STEP];
            let html = `<h3>${s.t}</h3>`;
            if(s.type === 'user') {
                html += `<select id="win" class="wiz-input">${U_DB.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select>`;
            } else {
                html += `<input type="${s.type}" id="win" class="wiz-input" autofocus placeholder="請輸入...">`;
            }
            document.getElementById('wizBody').innerHTML = html;
            document.getElementById('wizNextBtn').innerText = (CUR_STEP === FLOWS[CUR_MODE].length-1) ? "確認提交" : "下一步";
        }

        function wizNext() {
            const input = document.getElementById('win');
            let val = input.value;
            if (FLOWS[CUR_MODE][CUR_STEP].type === "number") {
                val = Number(val) || 0;
            }
            FORM[FLOWS[CUR_MODE][CUR_STEP].f] = val;
            if(CUR_STEP < FLOWS[CUR_MODE].length - 1) { 
                CUR_STEP++; 
                renderWiz(); 
            } else { 
                submitFinal(); 
            }
        }

        async function submitFinal() {
            document.getElementById('wizModal').style.display = 'none';
            document.getElementById('syncMask').style.display = 'flex';
            document.getElementById('loaderText').innerText = "正在處理交易...";
            try {
                // 如果是扣款，金額轉負值
                if(CUR_MODE === 'sub') FORM.amt = -Math.abs(FORM.amt);
                
                const b = { action: 'adminAction', type: CUR_MODE, ...FORM };
                const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(b) }).then(r => r.json());
                alert(r.message);
                location.reload();
            } catch (e) {
                alert("提交失敗：" + e.message);
                document.getElementById('syncMask').style.display = 'none';
            }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
