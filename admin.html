<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小佑 POS 旗艦大字系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --main: #1e272e; --accent: #FF8FA3; --bg: #f0f2f5; --success: #2ecc71; --danger: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* 左側大導覽 */
        .sidebar { width: 140px; background: var(--main); color: white; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .side-btn { margin-bottom: 40px; font-size: 50px; cursor: pointer; }

        /* 工作區 */
        .work-area { flex: 1; padding: 40px; display: flex; flex-direction: column; }
        .status-bar { background: #333; color: #ffeb3b; padding: 25px; border-radius: 20px; margin-bottom: 30px; font-size: 32px; font-weight: 900; text-align: center; border: 4px solid var(--accent); }
        
        /* POS 按鈕網格 - 放大 */
        .pos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
        .pos-card { background: white; height: 220px; border-radius: 35px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 15px 30px rgba(0,0,0,0.1); cursor: pointer; border: 5px solid transparent; transition: 0.2s; }
        .pos-card:active { transform: scale(0.92); background: #eee; }
        .pos-card h2 { margin-top: 15px; font-size: 36px; color: #111; }
        .pos-card i { font-size: 80px; }

        /* 全螢幕加載圈 */
        #loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.98); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        #scanner-wrap { display: none; background: #000; border-radius: 40px; overflow: hidden; position: relative; border: 8px solid var(--accent); }
    </style>
</head>
<body>

<audio id="cashSound" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>

<div id="loading">
    <div style="width:120px; height:120px; border:15px solid #ddd; border-top:15px solid var(--accent); border-radius:50%; animation:spin 1s linear infinite;"></div>
    <h1 style="color:var(--accent); font-size:48px; margin-top:40px;">系統處理中...</h1>
</div>

<div class="sidebar">
    <div class="side-btn" onclick="location.reload()">🏠</div>
    <div class="side-btn" onclick="showCoupons()">🎟️</div>
    <div class="side-btn" onclick="location.href='/'">🚪</div>
</div>

<div class="work-area">
    <div class="status-bar" id="hint">POS 系統就緒：請選擇功能</div>
    
    <div id="main-menu" class="pos-grid">
        <div class="pos-card" style="border-color:var(--success);" onclick="ready('add', '請掃描：加值[+]')"><i>💰</i><h2>加值 [+]</h2></div>
        <div class="pos-card" style="border-color:var(--danger);" onclick="ready('sub', '請掃描：扣款[-]')"><i>🛒</i><h2>扣款 [-]</h2></div>
        <div class="pos-card" style="border-color:#3498db;" onclick="ready('ref', '請掃描：退款[+]')"><i>🔄</i><h2>退款 [+]</h2></div>
        <div class="pos-card" style="border-color:#9b59b6;" onclick="ready('query', '請掃描：查詢資料')"><i>🔍</i><h2>查詢資料</h2></div>
    </div>

    <div id="scanner-wrap">
        <div id="reader" style="width:100%;"></div>
        <button onclick="location.reload()" style="width:100%; padding:35px; background:#222; color:white; border:none; font-size:32px; font-weight:bold;">❌ 取消返回</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby5cwOhok9ANFdB7Hx8xGszckMP-0_PUb3u4DfDME_hzjW1plAUBdoP8tJ7C5ukwnOd/exec";
    let mode = "";
    const html5QrCode = new Html5Qrcode("reader");

    function ready(m, txt) {
        mode = m;
        document.getElementById('hint').innerText = "⚠️ 操作中：" + txt;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('scanner-wrap').style.display = 'block';
        
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 350 }, (text) => {
            html5QrCode.stop();
            execute(text);
        });
    }

    async function execute(val) {
        let uid = val, amount = 0;
        if(val.includes('|')) {
            const p = val.split('|');
            uid = p[1]; amount = p[2];
        }

        if(mode !== 'query' && !amount) {
            amount = prompt("請輸入交易金額：");
            if(!amount) return location.reload();
        }

        document.getElementById('loading').style.display = 'flex';
        const finalAmt = (mode === 'sub') ? -amount : amount;

        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'adminAction',
                    uid: uid,
                    amount: finalAmt,
                    desc: "POS_" + mode,
                    adminName: "櫃員小佑"
                })
            }).then(r => r.json());

            if(res.success) {
                document.getElementById('cashSound').play();
                alert("✅ 交易成功！\n目前餘額：$" + res.message);
            } else alert("❌ 失敗：" + res.message);
        } catch(e) { alert("連線錯誤"); }
        location.reload();
    }
</script>
<style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
