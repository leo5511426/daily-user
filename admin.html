<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小佑 POS 系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #f4f4f4; --main: #2c3e50; --accent: #FF8FA3; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; }
        .sidebar { width: 100px; background: var(--main); color: #fff; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .work-area { flex: 1; padding: 30px; }
        .hint-bar { background: #333; color: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 24px; font-weight: bold; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .pos-btn { background: #fff; height: 180px; border-radius: 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; cursor: pointer; border: 4px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        /* 縮小掃描框：只留中間一塊 */
        #reader { width: 320px !important; height: 320px !important; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 5px solid var(--accent); }
        #loading, #successPop { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <audio id="cashSound" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>
    <div id="loading"><h1>系統處理中...</h1></div>
    <div id="successPop">
        <div style="font-size:100px;">✅</div>
        <h1 id="popMsg" style="font-size:40px; color:#2c3e50;">交易完成</h1>
        <p style="font-size:24px; color:#666;">視窗將自動關閉</p>
    </div>

    <div class="sidebar">
        <div style="font-size:40px; cursor:pointer;" onclick="location.reload()">🏠</div>
        <div style="font-size:40px; margin-top:40px; cursor:pointer;" onclick="showCoupon()">🎟️</div>
    </div>

    <div class="work-area">
        <div class="hint-bar" id="hint">請選擇操作功能</div>
        <div id="menu" class="grid">
            <div class="pos-btn" style="border-color:#2ecc71" onclick="ready('add','加值[+]')">💰 加值</div>
            <div class="pos-btn" style="border-color:#e74c3c" onclick="ready('sub','扣款[-]')">🛒 扣款</div>
            <div class="pos-btn" style="border-color:#3498db" onclick="ready('ref','退款[+]')">🔄 退款</div>
            <div class="pos-btn" style="border-color:#9b59b6" onclick="ready('query','查詢會員')">🔍 查詢</div>
        </div>
        <div id="scan-wrap" style="display:none; text-align:center;">
            <div id="reader"></div>
            <button onclick="location.reload()" style="padding:20px 50px; font-size:20px; background:#444; color:#fff; border:none; border-radius:10px;">取消返回</button>
        </div>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbyf2xJMYD06hcsslulemGVoBZ4CWwy3vwa2IthIw8lMWdQsPlXGqLPcmq-v2LR9D4Hr/exec";
        let mode = "";
        const scanner = new Html5Qrcode("reader");

        function ready(m, t){
            mode = m;
            document.getElementById('hint').innerText = "操作中：" + t;
            document.getElementById('menu').style.display='none';
            document.getElementById('scan-wrap').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                scanner.stop();
                execute(text);
            });
        }

        async function execute(val){
            let uid = val, amt = 0;
            if(val.includes('|')){ const p=val.split('|'); uid=p[1]; amt=p[2]; }
            if(mode !== 'query' && !amt) amt = prompt("輸入金額");
            
            document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'adminAction',uid:uid,amount:mode==='sub'?-amt:amt,desc:'POS_'+mode,adminName:'小佑'})}).then(r=>r.json());
            document.getElementById('loading').style.display='none';
            
            if(res.success){
                document.getElementById('cashSound').play();
                document.getElementById('popMsg').innerText = "交易完成！\n新餘額：$" + res.message;
                document.getElementById('successPop').style.display='flex';
                setTimeout(()=>location.reload(), 2500); // 2.5秒自動關閉
            } else alert(res.message);
        }
    </script>
</body>
</html>
