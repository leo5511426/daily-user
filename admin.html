<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理端 v7.7</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 25px; font-weight: bold; }
        .card { background: #fff; padding: 30px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        select, input { width: 100%; padding: 18px; margin: 12px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 18px; }
        .btn { padding: 20px; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 20px; transition: 0.3s; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; opacity: 0.8; }
        
        /* 處理中遮罩 */
        #loadingOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.85); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .spin { border: 6px solid #f3f3f3; border-top: 6px solid #3b82f6; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loadingOverlay"><div class="spin"></div><h2 id="loadingText">系統處理中，請稍後...</h2></div>

    <div class="card">
        <h3>💰 帳務核心操作</h3>
        <button onclick="startScan()" style="background:#444; color:#fff; padding:12px; border-radius:10px; margin-bottom:15px;">📷 啟動條碼掃描</button>
        <div id="qrDiv" style="display:none; margin-bottom:20px;"></div>
        
        <select id="tUser"><option value="">-- 選擇會員 --</option></select>
        <select id="tAction">
            <option value="add">➕ 儲值 (加值)</option>
            <option value="sub">➖ 消費 (扣款)</option>
            <option value="refund">↩️ 退款 (退回)</option>
        </select>
        <input type="number" id="tAmt" placeholder="請輸入金額">
        <input type="text" id="tNote" placeholder="輸入備註 (如：購買社服)">
        
        <button id="btnSubmit" class="btn btn-primary" onclick="doTrans()">確認執行交易</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbz0uwkCVQ7nn2_wiCh34fqFpHkLX9_R31oqGZ0l8D22wLh83s6IcsqgXArdh-g7qtZ9/exec";
        const scanner = new Html5Qrcode("qrDiv");

        async function init(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:'ADMIN'})}).then(r=>r.json());
            const sel = document.getElementById('tUser');
            res.list.forEach(u => sel.innerHTML += `<option value="${u.id}">${u.name} (${u.id})</option>`);
        }

        async function doTrans() {
            const btn = document.getElementById('btnSubmit');
            if(!tUser.value || !tAmt.value) return alert("請完整填寫會員與金額！");

            // --- 防重複點擊啟動 ---
            btn.disabled = true;
            btn.innerText = "處理中，請勿關閉分頁...";
            setLoading(true);

            const type = tAction.value;
            const amt = (type === 'sub') ? -Math.abs(tAmt.value) : Math.abs(tAmt.value);
            const body = { 
                action: 'adminAction', type, uid: tUser.value, amount: amt, 
                desc: tAction.options[tAction.selectedIndex].text, note: tNote.value, adminName: '管理員' 
            };

            try {
                const res = await fetch(GAS, { method: 'POST', body: JSON.stringify(body) }).then(r => r.json());
                alert(res.message);
                location.reload();
            } catch (e) {
                alert("傳輸發生錯誤，請檢查網路後重試。");
                btn.disabled = false;
                btn.innerText = "確認執行交易";
                setLoading(false);
            }
        }

        function setLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        
        function startScan(){
            document.getElementById('qrDiv').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                if(txt.includes('|')){
                    const p = txt.split('|'); tUser.value=p[1]; tAmt.value=p[2]; tAction.value="add"; tNote.value="掃描快速加值";
                } else { tUser.value=txt; }
                scanner.stop(); document.getElementById('qrDiv').style.display='none';
            });
        }
        init();
    </script>
</body>
</html>
