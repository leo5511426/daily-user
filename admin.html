<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POS 管理系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --main: #2c3e50; --accent: #FF8FA3; }
        body { font-family: sans-serif; margin: 0; background: #f8f9fa; display: flex; height: 100vh; font-weight: 900; }
        .sidebar { width: 120px; background: var(--main); color: #fff; display: flex; flex-direction: column; align-items: center; padding-top: 30px; }
        .side-btn { background: none; border: 2px solid #fff; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 25px; width: 85%; cursor: pointer; font-weight: 900; }
        .work-area { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .hint { background: #333; color: #ffeb3b; padding: 25px; border-radius: 20px; font-size: 28px; text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card { background: #fff; padding: 50px 20px; border-radius: 25px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer; border-bottom: 6px solid #ddd; }
        .card h3 { font-size: 35px; margin: 0; }
        #reader { width: 350px !important; margin: 0 auto; border-radius: 25px; border: 6px solid var(--accent); }
        #loading, #successPop, #amtLayer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .input-box { width: 80%; padding: 25px; margin: 20px 0; border-radius: 20px; border: 4px solid #ccc; font-size: 40px; text-align: center; font-weight: 900; }
    </style>
</head>
<body>
    <audio id="cashSound" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>
    <div id="loading"><h1>執行中...</h1></div>
    <div id="amtLayer">
        <h1>輸入操作金額</h1>
        <input type="number" id="amtIn" class="input-box">
        <div style="display:flex; gap:20px; width:80%;">
            <button class="side-btn" style="background:#888; border:none; height:80px; font-size:25px;" onclick="location.reload()">取消</button>
            <button class="side-btn" style="background:var(--main); border:none; height:80px; font-size:25px;" onclick="submitAction()">確認</button>
        </div>
    </div>
    <div id="successPop" onclick="location.reload()">
        <div style="font-size:120px;">✅</div>
        <h1 id="popMsg" style="font-size:45px; text-align:center;"></h1>
    </div>

    <div class="sidebar">
        <button class="side-btn" onclick="location.reload()">回首頁</button>
        <button class="side-btn" onclick="location.href='/'">登出</button>
    </div>

    <div class="work-area">
        <div class="hint" id="hint">請選擇 POS 功能</div>
        <div id="menu" class="grid">
            <div class="card" style="border-color:#2ecc71;" onclick="ready('add','加值')"><h3>加值 [+]</h3></div>
            <div class="card" style="border-color:#e74c3c;" onclick="ready('sub','扣款')"><h3>扣款 [-]</h3></div>
        </div>
        <div id="scan-view" style="display:none; text-align:center;">
            <div id="reader"></div>
            <button class="side-btn" style="background:#444; width:250px; margin-top:40px; color:#fff;" onclick="location.reload()">放棄掃描</button>
        </div>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbwgbkO5F1Gq1csUtlzjBNnW0jZEKznWwET2qDmvDR0RHNpb-y5qKWw1ZK2y5j_44TIo/exec";
        let mode=""; let targetUid="";
        const scanner = new Html5Qrcode("reader");

        function ready(m, t){
            mode=m; document.getElementById('hint').innerText="當前模式："+t;
            document.getElementById('menu').style.display='none';
            document.getElementById('scan-view').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 280 }, (txt) => { scanner.stop(); handleScanned(txt); });
        }

        function handleScanned(val){
            if(val.includes('|')){
                const p=val.split('|'); targetUid=p[1]; document.getElementById('amtIn').value=p[2]; submitAction();
            } else { targetUid=val; document.getElementById('amtLayer').style.display='flex'; }
        }

        async function submitAction(){
            const amt = document.getElementById('amtIn').value || 0;
            document.getElementById('amtLayer').style.display='none';
            document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'adminAction',uid:targetUid,amount:mode==='sub'?-amt:amt,desc:'POS_'+mode,adminName:'櫃員'})}).then(r=>r.json());
            document.getElementById('loading').style.display='none';
            if(res.success){
                document.getElementById('cashSound').play();
                document.getElementById('popMsg').innerText = "交易成功！\n餘額：$" + res.message;
                document.getElementById('successPop').style.display='flex';
            } else { alert("失敗：" + res.message); location.reload(); }
        }
    </script>
</body>
</html>
