<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理後台 v9.0</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; font-weight: bold; }
        .card { background: #fff; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-blue { background: #3b82f6; color: #fff; }
        .btn-green { background: #10b981; color: #fff; }
        .btn-red { background: #ef4444; color: #fff; }
        .pay-info { background: #f0fdf4; padding: 15px; border-radius: 10px; border: 1px dashed #10b981; margin: 10px 0; }
        #loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="loading"><div style="border:4px solid #f3f3f3; border-top:4px solid #3b82f6; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite;"></div><p>系統處理中...</p></div>

    <div class="card">
        <h3>📷 快速掃描</h3>
        <div id="qrDiv" style="width:100%; max-width:400px; display:none; margin-bottom:10px;"></div>
        <button class="btn" style="background:#444; color:#fff;" onclick="startScan()">啟動相機</button>
    </div>

    <div class="card" style="border-top: 5px solid #3b82f6;">
        <h3>💰 撥付借款</h3>
        <select id="lUser"><option value="">-- 選擇會員 --</option></select>
        <input type="text" id="lItem" placeholder="項目 (如：代墊午餐)">
        <input type="number" id="lAmt" placeholder="本金金額">
        <input type="date" id="lDeadline">
        <button id="btnL" class="btn btn-blue" onclick="doCreateLoan()">確認撥款</button>
    </div>

    <div class="card" style="border-top: 5px solid #10b981;">
        <h3>⚖️ 複合還款 (支援餘額補足)</h3>
        <select id="pLoan" onchange="autoFill()"><option value="">-- 選擇待還款項 --</option></select>
        <div class="pay-info">
            <label>💵 實收現金：</label>
            <input type="number" id="pCash" oninput="recalc()">
            <label>💳 餘額扣除 (自動差額)：</label>
            <input type="number" id="pBal" readonly style="background:#eee; color:#d63384;">
            <p style="text-align:right; margin:5px 0 0; color:#10b981;">總計還款：$ <span id="pTotal">0</span></p>
        </div>
        <button id="btnP" class="btn btn-green" onclick="doPay()">完成複合還款</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbwVssTj0tS-UT9_zNFvrfqc1gjSKWRm4NfnYc6EN1nMQrxoJlecTUnGl4aLP2WHSRtl/exec";
        const scanner = new Html5Qrcode("qrDiv");

        async function init() {
            const u = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:'ADMIN'})}).then(r=>r.json());
            u.list.forEach(i => document.getElementById('lUser').innerHTML += `<option value="${i.id}">${i.name}</option>`);
            const l = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:'ADMIN_LIST'})}).then(r=>r.json());
            l.list.forEach(i => document.getElementById('pLoan').innerHTML += `<option value="${i.id}" data-uid="${i.uid}" data-rem="${i.remain}">${i.uid} | ${i.item} (欠$${i.remain})</option>`);
        }

        function autoFill() {
            const opt = pLoan.selectedOptions[0];
            if(opt.dataset.rem) { pCash.value = opt.dataset.rem; recalc(); }
        }

        function recalc() {
            const opt = pLoan.selectedOptions[0];
            if(!opt.dataset.rem) return;
            const total = parseFloat(opt.dataset.rem);
            const cash = parseFloat(pCash.value) || 0;
            const bal = (cash < total) ? total - cash : 0;
            pBal.value = bal.toFixed(0);
            pTotal.innerText = (cash + bal).toFixed(0);
        }

        async function api(btnId, body) {
            document.getElementById(btnId).disabled = true; document.getElementById('loading').style.display='flex';
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify(body)}).then(r=>r.json());
            alert(res.message); location.reload();
        }

        function doCreateLoan() { api('btnL', { action:'adminAction', type:'create_loan', uid:lUser.value, loanItem:lItem.value, amount:lAmt.value, deadline:lDeadline.value }); }
        
        function doPay() {
            const opt = pLoan.selectedOptions[0];
            api('btnP', { action:'adminAction', type:'pay_loan', loanId:opt.value, uid:opt.dataset.uid, cashPart:pCash.value, balPart:pBal.value });
        }

        function startScan() {
            document.getElementById('qrDiv').style.display='block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                if(txt.startsWith("USE_CP|")) { api('btnP', { action:'adminAction', type:'use_coupon', cpId:txt.split('|')[1] }); }
                else { alert("會員 ID: " + txt); }
                scanner.stop();
            });
        }
        init();
    </script>
</body>
</html>
