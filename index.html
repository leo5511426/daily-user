<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑系統 v7.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --pink: #FFD1DC; --accent: #FF8FA3; --card: #111; --blue: #3b82f6; --green: #2ecc71; --red: #ff5252; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; font-weight: 900; }
        .page { width: 100vw; min-height: 100vh; padding: 80px 20px 110px; box-sizing: border-box; display: none; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; background: var(--accent); color: #fff; border: none; font-size: 18px; font-weight: 900; cursor: pointer; }
        .input-box { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        .mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
        #fullMask { background: #000; }
        #halfMask { background: rgba(0,0,0,0.7); }
        .spinner { border: 5px solid #222; border-top: 5px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #0a0a0a; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 11px; }
        .nav-item.active { color: var(--pink); }
        .detail-box { max-height: 0; overflow: hidden; transition: 0.3s; background: #080808; font-size: 13px; color: #888; border-radius: 10px; }
        .detail-box.show { max-height: 250px; padding: 10px; border: 1px solid #333; margin-top: 10px; }
        #qrModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="fullMask" class="mask"><div class="spinner"></div>系統處理中，請稍後...</div>
    <div id="halfMask" class="mask"><div class="spinner"></div>資料同步理中，請稍後...</div>

    <div id="loginView" style="display:flex; height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
        <h1 style="color:var(--pink);">小佑會員網</h1>
        <input type="text" id="acc" class="input-box" placeholder="帳號">
        <input type="password" id="pw" class="input-box" placeholder="密碼">
        <button class="btn" onclick="login()">進入系統</button>
    </div>

    <div id="appView" style="display:none;">
        <div id="p0" class="page" style="display:block;">
            <h2>你好，<span id="uName">...</span></h2>
            <div class="card" style="text-align:center;"><small>可用餘額</small><div style="font-size:55px; color:var(--pink);">$ <span id="uBal">0</span></div></div>
            <button class="btn" onclick="showQR('ID')">出示會員識別碼</button>
            <div class="card" style="margin-top:20px;">
                <small>快速加值條碼</small>
                <input type="number" id="quickAmt" class="input-box" placeholder="輸入金額">
                <button class="btn" style="background:var(--green);" onclick="showQR('TOPUP')">產生條碼</button>
            </div>
        </div>
        <div id="p1" class="page"><h2>交易紀錄</h2><div id="tList"></div></div>
        <div id="p4" class="page"><h2>借款帳務</h2><div id="loanList"></div></div>
        <div id="p2" class="page"><h2>我的優惠券</h2><div id="cList"></div></div>
        <div id="p3" class="page">
            <h2>設定</h2>
            <div class="card">
                <input type="text" id="newName" class="input-box" placeholder="新姓名">
                <input type="password" id="newPw" class="input-box" placeholder="新密碼">
                <button class="btn" onclick="updateUser()">更新資料</button>
            </div>
            <button class="btn" style="background:var(--red);" onclick="location.reload()">登出</button>
        </div>
        <div class="nav-bar">
            <div class="nav-item active" onclick="go(0)">首頁</div>
            <div class="nav-item" onclick="go(1)">紀錄</div>
            <div class="nav-item" onclick="go(4)">借款</div>
            <div class="nav-item" onclick="go(2)">優惠</div>
            <div class="nav-item" onclick="go(3)">設定</div>
        </div>
    </div>

    <div id="qrModal" onclick="this.style.display='none'"><div id="qrcode" style="padding:15px; background:#fff; border-radius:10px;"></div></div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbz0uwkCVQ7nn2_wiCh34fqFpHkLX9_R31oqGZ0l8D22wLh83s6IcsqgXArdh-g7qtZ9/exec";
        let user = null;
        const qrc = new QRCode(document.getElementById("qrcode"), { width: 220, height: 220 });

        async function login(){
            toggleMask('full', true);
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'login',acc:acc.value,pw:pw.value})}).then(r=>r.json());
            if(res.success){
                user=res; updateUI(); loginView.style.display='none'; appView.style.display='block';
            } else alert(res.message);
            toggleMask('full', false);
        }

        function showQR(type){
            let d = user.id;
            if(type==='TOPUP'){ d=`TOPUP|${user.id}|${quickAmt.value}`; if(!quickAmt.value)return alert("請輸入金額"); }
            qrc.clear(); qrc.makeCode(d); qrModal.style.display='flex';
        }

        async function go(idx){
            document.querySelectorAll('.page').forEach(p=>p.style.display='none');
            document.getElementById('p'+idx).style.display='block';
            document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active', [0,1,4,2,3][i]===idx));
            if(idx!==0){ toggleMask('half', true); if(idx===1)await fetchTrans(); if(idx===4)await fetchLoans(); if(idx===2)await fetchCoupons(); toggleMask('half', false); }
        }

        async function fetchTrans(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'trans',uid:user.id})}).then(r=>r.json());
            tList.innerHTML = res.list.map((r,i)=>`
                <div class="card">
                    <div class="item-header" onclick="toggleDetail('t${i}')">
                        <div><b>${r.desc}</b><br><small>${r.date.split(' ')[0]}</small></div>
                        <div style="text-align:right">
                            <span style="color:${r.amount>0?'var(--green)':'var(--red)'}">${r.amount>0?'+':''}${r.amount}</span>
                            <span id="arr-t${i}" style="font-size:10px;">▼</span>
                        </div>
                    </div>
                    <div id="t${i}" class="detail-box">執行人: ${r.admin}<br>餘額: $${r.balance}<br><span style="color:var(--pink)">備註: ${r.note||'無'}</span></div>
                </div>`).join('');
        }

        async function fetchLoans(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:user.id})}).then(r=>r.json());
            loanList.innerHTML = res.list.map((l,i)=>`
                <div class="card">
                    <div class="item-header" onclick="toggleDetail('l${i}')">
                        <div><b>${l.item}</b><br><small>尚欠: $${l.remain}</small></div>
                        <span id="arr-l${i}" style="font-size:10px;">▼</span>
                    </div>
                    <div id="l${i}" class="detail-box">期限: ${l.deadline}<br>本金: $${l.principal}<br>利息: $${l.interest}<br>已還: $${l.paid}</div>
                </div>`).join('');
        }

        async function fetchCoupons(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'coupons',uid:user.id})}).then(r=>r.json());
            cList.innerHTML = res.list.map(c=>`<div class="card"><b>${c.name}</b><br><small>${c.desc}</small><br><small style="color:var(--accent)">效期: ${c.exp}</small></div>`).join('');
        }

        async function updateUser(){
            toggleMask('half', true);
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'updateProfile',uid:user.id,newName:newName.value,newPw:newPw.value})}).then(r=>r.json());
            alert(res.message); toggleMask('half', false);
        }

        function toggleDetail(id){ document.getElementById(id).classList.toggle('show'); }
        function toggleMask(t,s){ document.getElementById(t+'Mask').style.display=s?'flex':'none'; }
        function updateUI(){ uName.innerText=user.name; uBal.innerText=user.balance; }
    </script>
</body>
</html>
