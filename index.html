<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑會員系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #121212; --pink: #FFD1DC; --accent: #FF8FA3; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; }
        #loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; flex-direction:column; justify-content:center; align-items:center; }
        .top-nav { position: fixed; top: 0; width: 100%; height: 70px; display: flex; justify-content: flex-end; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .icon-btn { background: var(--card); border: 2px solid var(--accent); color: var(--pink); padding: 10px; border-radius: 12px; font-size: 24px; margin-left: 10px; }
        .slide-wrap { display: flex; width: 400%; height: 100vh; transition: 0.3s; }
        .page { width: 25%; padding: 80px 20px; box-sizing: border-box; overflow-y: auto; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: var(--card); display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; color: #666; }
        .nav-item.active { color: var(--pink); font-weight: bold; }
        .nav-item span { font-size: 28px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; text-align: center; }
        .btn { width: 100%; padding: 20px; border-radius: 15px; background: var(--accent); color: #fff; border: none; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading"><div style="width:50px; height:50px; border:5px solid #333; border-top-color:var(--accent); border-radius:50%; animation:spin 1s infinite linear;"></div><p>系統處理中...</p></div>

    <div id="loginView" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
        <h1 style="color:var(--pink); font-size:32px;">小佑會員網</h1>
        <input type="tel" id="acc" placeholder="手機號碼" style="width:100%; padding:15px; margin:10px 0; border-radius:10px; border:none; font-size:18px;">
        <input type="password" id="pw" placeholder="密碼" style="width:100%; padding:15px; margin:10px 0; border-radius:10px; border:none; font-size:18px;">
        <button class="btn" onclick="login()">登入系統</button>
    </div>

    <div id="appView" style="display:none;">
        <div class="top-nav"><div class="icon-btn" onclick="showQR('ID')">🔳</div><div class="icon-btn" onclick="location.reload()">🚪</div></div>
        <div class="slide-wrap" id="slide">
            <div class="page">
                <h2>你好，<span id="uName" style="color:var(--pink);">...</span></h2>
                <div class="card"><small>目前餘額</small><h1 style="font-size:50px;">$ <span id="uBal">0</span></h1></div>
                <button class="btn" onclick="showQR('TOPUP')">發起儲值</button>
            </div>
            <div class="page"><h3>交易紀錄</h3><div id="tList">讀取中...</div></div>
            <div class="page"><h3>優惠券</h3><div id="cList">目前無優惠</div></div>
            <div class="page"><h3>個人中心</h3><button class="btn" style="background:#444;" onclick="alert('確認要刪除嗎？')">刪除帳號</button></div>
        </div>
        <div class="nav-bar">
            <div class="nav-item active" onclick="go(0, this)"><span>🏠</span>首頁</div>
            <div class="nav-item" onclick="go(1, this)"><span>🧾</span>紀錄</div>
            <div class="nav-item" onclick="go(2, this)"><span>🎟️</span>優惠</div>
            <div class="nav-item" onclick="go(3, this)"><span>👤</span>我的</div>
        </div>
    </div>

    <div id="qrOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:999; justify-content:center; align-items:center;" onclick="this.style.display='none'">
        <div style="background:#fff; padding:30px; border-radius:20px; text-align:center;">
            <h3 id="qrT" style="color:#000;"></h3>
            <div id="qrcode"></div>
        </div>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbyf2xJMYD06hcsslulemGVoBZ4CWwy3vwa2IthIw8lMWdQsPlXGqLPcmq-v2LR9D4Hr/exec";
        let user = null;
        function toggleL(s){ document.getElementById('loading').style.display=s?'flex':'none'; }
        function go(i, el){ 
            document.getElementById('slide').style.transform=`translateX(-${i*25}%)`;
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            el.classList.add('active');
            if(i===1) fetchHistory();
        }
        async function login(){
            toggleL(true);
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'login',acc:document.getElementById('acc').value,pw:document.getElementById('pw').value})}).then(r=>r.json());
            toggleL(false);
            if(res.success){
                if(res.role==='admin') location.href='/admin';
                else { user=res; document.getElementById('loginView').style.display='none'; document.getElementById('appView').style.display='block'; document.getElementById('uName').innerText=user.name; document.getElementById('uBal').innerText=user.balance; }
            } else alert(res.message);
        }
        function showQR(type){
            document.getElementById('qrcode').innerHTML="";
            let text = type==='ID'?user.id:`TOPUP|${user.id}|${prompt('輸入儲值金額')}`;
            document.getElementById('qrT').innerText=type==='ID'?'會員身份碼':'儲值碼';
            new QRCode(document.getElementById('qrcode'),{text:text,width:200,height:200});
            document.getElementById('qrOverlay').style.display='flex';
        }
        async function fetchHistory(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'trans',uid:user.id})}).then(r=>r.json());
            document.getElementById('tList').innerHTML = res.list.map(r=>`<div class='card' style='text-align:left;'><b>${r[2]}</b><br><small>${new Date(r[0]).toLocaleString()}</small><span style='float:right; color:var(--accent);'>$${r[3]}</span></div>`).join('');
        }
    </script>
    <style>@keyframes spin {100%{transform:rotate(360deg);}}</style>
</body>
</html>
