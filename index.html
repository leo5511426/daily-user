<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑行動會員 - v27.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --pink: #FFD1DC; --accent: #FF8FA3; --card: #151515; --red: #ff5252; --green: #2ecc71; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; font-weight: 900; }
        .page { width: 100vw; min-height: 100vh; padding: 100px 20px 130px; box-sizing: border-box; display: none; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #282828; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; background: var(--accent); color: #fff; border: none; font-size: 18px; font-weight: 900; margin-top: 10px; cursor: pointer; }
        .btn-small { width: auto; padding: 8px 15px; font-size: 12px; border-radius: 8px; background: #333; color: #aaa; border: none; margin-top: 10px; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: #0a0a0a; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 13px; cursor: pointer; }
        .nav-item.active { color: var(--pink); }
        .detail { max-height: 0; overflow: hidden; transition: 0.3s; font-size: 14px; color: #888; }
        .detail.show { max-height: 500px; padding-top: 15px; border-top: 1px solid #222; margin-top: 10px; line-height: 1.6; }
        .mask-full { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .mask-half { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9998; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #qrModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="mFull" class="mask-full"><div class="spinner"></div><p>系統啟動中...</p></div>
    <div id="mHalf" class="mask-half"><div class="spinner"></div><p>同步雲端數據...</p></div>

    <div id="loginView" style="display:flex; height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
        <h1 style="color:var(--pink); font-size:32px;">小佑行動會員</h1>
        <input type="text" id="acc" style="width:100%; padding:18px; margin:10px; background:#222; border:none; color:#fff; border-radius:12px; box-sizing:border-box;" placeholder="帳號">
        <input type="password" id="pw" style="width:100%; padding:18px; margin:10px; background:#222; border:none; color:#fff; border-radius:12px; box-sizing:border-box;" placeholder="密碼">
        <button class="btn" onclick="login()">登入系統</button>
    </div>

    <div id="appView" style="display:none;">
        <div id="p0" class="page" style="display:block;">
            <h2>你好，<span id="uName">...</span></h2>
            <div class="card" style="text-align:center;"><div style="font-size:55px; color:var(--pink); font-weight:900;">$ <span id="uBal">0</span></div></div>
            <button class="btn" onclick="showQR('USER', user.id)">📘 個人識別碼</button>
        </div>
        <div id="p1" class="page"><h2>交易紀錄</h2><div id="tList"></div></div>
        <div id="p4" class="page"><h2>借款帳務</h2><div id="loanList"></div></div>
        <div id="p2" class="page"><h2>優惠券</h2><div id="cList"></div></div>
        <div id="p3" class="page"><h2>設定</h2><button class="btn" style="background:var(--red);" onclick="location.reload()">登出系統</button></div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="go(0)">首頁</div>
            <div class="nav-item" onclick="go(1)">紀錄</div>
            <div class="nav-item" onclick="go(4)">借款</div>
            <div class="nav-item" onclick="go(2)">優惠</div>
            <div class="nav-item" onclick="go(3)">設定</div>
        </div>
    </div>

    <div id="qrModal">
        <div style="background:#fff; padding:30px; border-radius:25px; text-align:center; width:280px;">
            <p id="qrTitle" style="color:#000; font-weight:bold; margin-top:0;"></p>
            <div id="qrcode" style="display:flex; justify-content:center;"></div>
            <button class="btn" style="background:var(--red); margin-top:20px;" onclick="document.getElementById('qrModal').style.display='none'">關閉</button>
        </div>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbzm-1gfB2NX9Mbk4C7Q2afwsCDuC26r4H_mrjkiZ2Zwdf31KlGMv0ieEQjywIuBsjeW/exec";
        let user = null;
        const qrc = new QRCode(document.getElementById("qrcode"), { width: 220, height: 220 });

        function safeNum(v) {
            if (v === null || v === undefined) return 0;
            if (typeof v === 'string' && v.includes('#')) return 0;
            const n = parseFloat(v);
            return isNaN(n) ? 0 : n;
        }

        function fmt(n) { return safeNum(n).toLocaleString(); }

        function getOverdue(deadlineStr) {
            if (!deadlineStr || deadlineStr === "無期限" || deadlineStr === "未設定期限") return { fee: 0, days: 0 };
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(deadlineStr); due.setHours(0,0,0,0);
            if (isNaN(due.getTime())) return { fee: 0, days: 0 };
            if (today > due) {
                const days = Math.ceil((today - due) / (1000 * 60 * 60 * 24));
                return { fee: days * 10, days: days };
            }
            return { fee: 0, days: 0 };
        }

        async function login(){
            document.getElementById('mFull').style.display='flex';
            try {
                // 為了與最新版後端相容，改用 fetchData 模式模擬登入，或維持你原本的登入後端 action
                const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:acc.value})}).then(r=>r.json());
                const found = res.list.find(u => u.id === acc.value); // 這裡簡化驗證，實際應配合後端 pw
                if(found){ 
                    user = found;
                    document.getElementById('uName').innerText = user.name; 
                    document.getElementById('uBal').innerText = fmt(user.bal); 
                    document.getElementById('loginView').style.display='none'; 
                    document.getElementById('appView').style.display='block'; 
                } else alert("帳號錯誤或不存在");
            } catch(e) { alert("連線失敗"); }
            document.getElementById('mFull').style.display='none';
        }

        function showQR(type, val){
            qrc.clear(); 
            const qrVal = (type === 'USER') ? val : "CP|" + val;
            document.getElementById('qrTitle').innerText = (type === 'USER') ? "會員識別碼" : "核銷條碼";
            qrc.makeCode(qrVal); 
            document.getElementById('qrModal').style.display='flex';
        }

        async function go(idx){
            document.querySelectorAll('.page').forEach(p=>p.style.display='none');
            document.getElementById('p'+idx).style.display='block';
            const navMap = [0, 1, 4, 2, 3];
            document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', navMap[i] === idx));

            if(idx!==0 && idx!==3){ 
                document.getElementById('mHalf').style.display='flex'; 
                if(idx===1) await fetchTrans(); 
                if(idx===4) await fetchLoans(); 
                if(idx===2) await fetchCoupons(); 
                document.getElementById('mHalf').style.display='none'; 
            }
        }

        // 注意：這裡的後端 API action 需確保與 Code.gs 一致
        async function fetchTrans(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'trans',uid:user.id})}).then(r=>r.json());
            // 如果後端沒寫特定 trans type，這裡可能需要微調欄位
            document.getElementById('tList').innerHTML = (res.list||[]).map((r,i)=>`
                <div class="card">
                    <div style="display:flex; justify-content:space-between;"><b>${r.item||'交易'}</b> <b style="color:${safeNum(r.amount)>0?'var(--green)':'var(--red)'}">${safeNum(r.amount)>0?'+':''}${fmt(r.amount)}</b></div>
                    <small style="color:#666;">${r.date || ''}</small>
                </div>`).join('');
        }

        async function fetchLoans(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:user.id})}).then(r=>r.json());
            const myLoans = (res.loans || []).filter(l => String(l.uid) === String(user.id));
            
            document.getElementById('loanList').innerHTML = myLoans.map((l,i)=>{
                const ov = getOverdue(l.expiry);
                const remain = safeNum(l.total) - safeNum(l.paid); 
                const totalDebt = remain + ov.fee; 
                return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${l.item}</b> 
                        <span style="color:var(--pink); font-size:24px;">$${fmt(totalDebt)}</span>
                    </div>
                    <div style="font-size:12px; color:#888;">本金 $${fmt(l.total)} | 已還 $${fmt(l.paid)} ${ov.fee > 0 ? ' | 罰金 $'+fmt(ov.fee) : ''}</div>
                    <button class="btn-small" onclick="document.getElementById('ld${i}').classList.toggle('show')">展開帳務明細</button>
                    <div id="ld${i}" class="detail">
                        剩餘未還: $${fmt(remain)}<br>
                        還款期限: ${l.expiry || '未設定'}<br>
                        逾期狀態: <span style="color:${ov.days > 0 ? 'var(--red)' : 'var(--green)'}">
                            ${ov.days > 0 ? '已逾期 ' + ov.days + ' 天' : '正常'}
                        </span><br>
                        <b style="color:var(--red);">逾期罰金合計: $${fmt(ov.fee)} (10元/天)</b>
                    </div>
                </div>`;
            }).join('') || '<p style="text-align:center;color:#666;">目前無還款中借單</p>';
        }

        async function fetchCoupons(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'users',uid:user.id})}).then(r=>r.json());
            document.getElementById('cList').innerHTML = (res.coupons||[]).filter(c=>c.owner===user.id && c.status==='未使用').map(c=>`
                <div class="card">
                    <b style="color:var(--pink);">優惠券 ID: ${c.id}</b>
                    <p style="font-size:14px; margin:5px 0;">可用於折抵或兌換</p>
                    <button class="btn" style="background:var(--green); font-size:14px; padding:10px;" onclick="showQR('CP', '${c.id}')">出示核銷碼</button>
                </div>`).join('') || '<p style="text-align:center;color:#666;">無可用優惠券</p>';
        }
    </script>
</body>
</html>
