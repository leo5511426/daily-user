<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑企業管理系統</title>
    <style>
        :root { --bg: #ffffff; --text: #000; --pink: #FF8FA3; --accent: #FF8FA3; --card: #f5f5f5; --border: #e0e0e0; --nav: #fafafa; --red: #ff5252; --green: #2ecc71; }
        [data-theme='dark'] { --bg: #000; --text: #fff; --card: #121212; --border: #252525; --nav: #080808; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; font-weight: 900; transition: 0.3s; }
        .page { width: 100vw; min-height: 100vh; padding: 100px 20px 130px; box-sizing: border-box; display: none; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .btn { width: 100%; padding: 18px; border-radius: 15px; background: var(--accent); color: #fff; border: none; font-size: 18px; font-weight: 900; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--nav); display: flex; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--pink); }
        .mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:999; flex-direction:column; justify-content:center; align-items:center; }
        input { width:100%; padding:18px; margin:10px 0; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text); box-sizing: border-box; }
    </style>
</head>
<body data-theme="light">
    <div id="loading" class="mask"><p>系統載入中...</p></div>

    <div id="loginView" style="display:flex; height:100vh; flex-direction:column; justify-content:center; padding:40px; box-sizing: border-box;">
        <h1 style="color:var(--pink); text-align:center;">企業後台登入</h1>
        <input type="text" id="acc" placeholder="帳號">
        <input type="password" id="pw" placeholder="密碼">
        <button class="btn" onclick="doLogin()">登入</button>
    </div>

    <div id="appView" style="display:none;">
        <div id="p0" class="page" style="display:block;">
            <h2 style="font-size: 28px;">您好，<span id="uName" style="color:var(--pink);">...</span></h2>
            <div class="card" style="text-align:center;">
                <div style="font-size:14px; opacity:0.6;">積分餘額</div>
                <div style="font-size:55px; color:var(--pink);">$ <span id="uBal">0</span></div>
            </div>
        </div>
        <div id="p2" class="page"><h2>訂單狀態</h2><div id="oList"></div></div>
        <div id="p3" class="page"><h2>帳單資訊</h2><div id="lList"></div></div>
        
        <div class="nav-bar">
            <div class="nav-item active" onclick="tab(0)">首頁</div>
            <div class="nav-item" onclick="tab(2)">訂單</div>
            <div class="nav-item" onclick="tab(3)">帳單</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzG1e-rrGvP9ErWRfVK4F2-eC3mPLFkC2Us0BUcdflzuc3H7kMM2QV5EtN2Xoc3zZt_/exec"; 
        let store = null;

        async function doLogin() {
            const uid = document.getElementById('acc').value.trim();
            const upw = document.getElementById('pw').value.trim();
            if(!uid || !upw) return alert("請輸入帳號密碼");
            document.getElementById('loading').style.display='flex';
            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'login', uid: uid, pw: upw }) 
                }).then(r => r.json());

                if (res.success) {
                    store = res; 
                    render();
                    document.getElementById('loginView').style.display='none';
                    document.getElementById('appView').style.display='block';
                } else { alert(res.message); }
            } catch(e) { alert("連線異常"); }
            document.getElementById('loading').style.display='none';
        }

        function render() {
            document.getElementById('uName').innerText = store.userData.name;
            document.getElementById('uBal').innerText = store.userData.bal.toLocaleString();
            
            // 訂單渲染
            document.getElementById('oList').innerHTML = store.data.orders.map(o => `
                <div class="card">
                    <b>單號: ${o.id} | ${o.status}</b>
                    <p style="font-size:13px;">${o.desc}</p>
                </div>
            `).join('') || '<p>無訂單</p>';

            // 帳單渲染
            document.getElementById('lList').innerHTML = store.data.loans.map(l => `
                <div class="card">
                    <b>${l.item}</b>
                    <div style="color:var(--red);">應繳: $${l.totalDue}</div>
                </div>
            `).join('') || '<p>無欠款</p>';
        }

        function tab(i) {
            document.querySelectorAll('.page').forEach(p => p.style.display='none');
            document.getElementById('p'+i).style.display='block';
            document.querySelectorAll('.nav-item').forEach((n,idx) => idx===i?n.classList.add('active'):n.classList.remove('active'));
        }
    </script>
</body>
</html>
