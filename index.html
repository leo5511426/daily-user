<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小佑會員網</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root { --bg: #1a1a1a; --card: #2d2d2d; --pink: #FFD1DC; --accent: #FF8FA3; --text: #f0f0f0; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; font-size: 18px; }
    
    /* 核心 UI 元件 */
    .main-btn { width: 85%; padding: 20px; border-radius: 15px; background: var(--accent); color: white; border: none; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.1s; }
    .main-btn:active { transform: scale(0.95); }
    input { width: 85%; padding: 18px; border-radius: 15px; background: var(--card); border: none; color: white; font-size: 18px; margin: 10px 0; outline: none; }
    
    /* 滑動容器 */
    #appView { display: none; height: 100vh; flex-direction: column; }
    .slide-container { display: flex; width: 400%; height: 100%; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .page { width: 25%; height: 100%; overflow-y: auto; padding: 25px; padding-bottom: 120px; box-sizing: border-box; }

    /* 卡片與導覽 */
    .card { background: var(--card); border-radius: 25px; padding: 30px; margin-bottom: 25px; border: 1px solid #333; }
    .nav-bar { position: fixed; bottom: 0; width: 100%; height: 95px; background: var(--card); display: flex; border-top: 1px solid #333; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; }
    .nav-item.active { color: var(--pink); font-weight: bold; }
    
    /* 條碼彈窗動畫 */
    #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:4000; justify-content:center; align-items:center; opacity:0; transition: 0.4s; }
    #qrBox { background:white; padding:40px; border-radius:30px; transform: scale(0.5); transition: 0.4s; text-align:center; }
    #overlay.show { opacity:1; }
    #overlay.show #qrBox { transform: scale(1); }
  </style>
</head>
<body>

<div id="loginView" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
  <h2 style="color:var(--pink); font-size:32px; margin-bottom:30px;">小佑會員網</h2>
  <input type="tel" id="acc" placeholder="手機號碼">
  <input type="password" id="pw" placeholder="密碼">
  <button class="main-btn" onclick="handleAuth()">登入系統</button>
</div>

<div id="appView">
  <div style="padding:25px; display:flex; justify-content:space-between; align-items:center;">
    <div style="font-size:22px;">你好，<span id="uName" style="color:var(--pink);">...</span></div>
    <div onclick="showQR(user.id, '身份條碼')" style="font-size:35px;">🔳</div>
  </div>
  <div style="flex:1; overflow:hidden;">
    <div class="slide-container" id="slide">
      <div class="page">
        <div class="card" style="border-color:var(--accent);">
          <div style="color:var(--pink);">目前餘額</div>
          <div style="font-size:48px; font-weight:bold; margin-top:10px;">$ <span id="uBal">0</span></div>
        </div>
        <button class="main-btn" style="width:100%;" onclick="startTopup()">發起儲值</button>
      </div>
      <div class="page"><h3>紀錄</h3><div id="tList"></div></div>
      <div class="page"><h3>優惠券</h3><div id="cList">目前暫無資料</div></div>
      <div class="page"><h3>設定</h3><div class="card" onclick="location.reload()">登出帳號</div></div>
    </div>
  </div>
  <div class="nav-bar">
    <div class="nav-item active" onclick="go(0, this)">🏠<span>首頁</span></div>
    <div class="nav-item" onclick="go(1, this)">🧾<span>紀錄</span></div>
    <div class="nav-item" onclick="go(2, this)">🎟️<span>券碼</span></div>
    <div class="nav-item" onclick="go(3, this)">👤<span>我的</span></div>
  </div>
</div>

<div id="overlay" onclick="this.classList.remove('show'); setTimeout(()=>this.style.display='none',400)">
  <div id="qrBox" onclick="event.stopPropagation()">
    <h3 id="popT" style="color:#333; margin-bottom:15px;"></h3>
    <div id="qrcode"></div>
    <p id="popD" style="color:#666; margin-top:15px; font-size:14px;"></p>
  </div>
</div>

<script>
  // 🔴 重要：請填入你的 Google Apps Script Web App URL
  const GAS_URL = "https://script.google.com/macros/s/AKfycby5cwOhok9ANFdB7Hx8xGszckMP-0_PUb3u4DfDME_hzjW1plAUBdoP8tJ7C5ukwnOd/exec";
  let user = null;

  async function api(data) {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
    return await res.json();
  }

  async function handleAuth() {
    const acc = document.getElementById('acc').value;
    const pw = document.getElementById('pw').value;
    const res = await api({ action: 'login', acc, pw });
    if(res.success) {
      user = res;
      if(user.role === 'admin') location.href = '/admin';
      else initApp();
    } else alert(res.message);
  }

  function initApp() {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('appView').style.display = 'flex';
    document.getElementById('uName').innerText = user.name;
    document.getElementById('uBal').innerText = user.balance;
    document.getElementById('uId').innerText = user.id;
  }

  function go(idx, el) {
    document.getElementById('slide').style.transform = `translateX(-${idx * 25}%)`;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    if(idx === 1) fetchList('trans');
  }

  function showQR(data, title) {
    const ov = document.getElementById('overlay');
    document.getElementById('qrcode').innerHTML = "";
    document.getElementById('popT').innerText = title;
    document.getElementById('popD').innerText = data;
    new QRCode(document.getElementById('qrcode'), { text: data, width: 220, height: 220 });
    ov.style.display = 'flex';
    setTimeout(() => ov.classList.add('show'), 10);
  }

  function startTopup() {
    const amt = prompt("輸入預計儲值金額");
    if(amt) showQR(`TOPUP|${user.id}|${amt}`, '儲值需求碼');
  }

  async function fetchList(type) {
    const res = await api({ action: 'fetch', type, uid: user.id });
    let html = "";
    res.list.forEach(r => {
      const isP = parseFloat(r[3]) > 0;
      html += `<div class="card"><b>${r[2]}</b><br><small>${new Date(r[0]).toLocaleDateString()}</small><div style="float:right; color:${isP?'var(--pink)':'#777'}">${isP?'+':''}${r[3]}</div></div>`;
    });
    document.getElementById('tList').innerHTML = html || "暫無資料";
  }
</script>
</body>
</html>
