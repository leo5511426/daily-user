<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員端</title>
    <style>
        :root { --pink: #FFD1DC; --red: #ff5252; --card: #1a1a1a; }
        body { background: #000; color: #fff; font-family: sans-serif; font-weight: 900; margin: 0; padding-bottom: 90px; }
        .page { padding: 80px 20px; display: none; }
        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 12px; border: 1px solid #333; }
        .overdue-glow { border: 2px solid var(--red); box-shadow: 0 0 15px rgba(255, 82, 82, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a0a; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 12px; }
        .active { color: var(--pink); }
    </style>
</head>
<body>
    <div id="loginView" style="display:flex; height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
        <h1 style="color:var(--pink);">你好，請登入</h1>
        <input type="text" id="acc" placeholder="帳號" style="width:100%; padding:15px; margin:10px; border-radius:10px;">
        <input type="password" id="pw" placeholder="密碼" style="width:100%; padding:15px; margin:10px; border-radius:10px;">
        <button onclick="login()" style="width:100%; padding:15px; background:var(--pink); border:none; border-radius:10px; font-weight:900;">登入系統</button>
    </div>

    <div id="appView" style="display:none;">
        <div id="p0" class="page" style="display:block;">
            <div class="card" style="text-align:center;">
                <small>目前儲值金餘額</small>
                <div style="font-size:50px; color:var(--pink);">$ <span id="uBal">0</span></div>
            </div>
            <h2>我的借款單</h2>
            <div id="loanList"></div>
        </div>
        <div id="p1" class="page"><h2>交易紀錄</h2><div id="tList"></div></div>
        <div class="nav">
            <div class="nav-item active" onclick="go(0)">帳務</div>
            <div class="nav-item" onclick="go(1)">歷史</div>
            <div class="nav-item" onclick="location.reload()">登出</div>
        </div>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbzWStm_kDFO0lOcPjiXQBw2sAHVnJKkpnx8iBDsiLcGFsNiQhV5LOQ8ctjbKhRHfOn4/exec";
        let user = null;

        async function login(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'login',acc:acc.value,pw:pw.value})}).then(r=>r.json());
            if(res.success){ user=res; uBal.innerText=res.balance; loginView.style.display='none'; appView.style.display='block'; fetchLoans(); }
        }

        async function go(idx){
            document.querySelectorAll('.page').forEach(p=>p.style.display='none');
            document.getElementById('p'+idx).style.display='block';
            if(idx===0) fetchLoans();
            if(idx===1) fetchTrans();
        }

        async function fetchLoans(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:user.id})}).then(r=>r.json());
            loanList.innerHTML = res.list.map(l => `
                <div class="card ${l.interest>0?'overdue-glow':''}">
                    <b>${l.item}</b> ${l.interest>0?'<span style="color:var(--red);">🚨 逾期利息中</span>':''}
                    <div style="display:flex; justify-content:space-between; margin-top:8px;">
                        <span>需還: $${l.remain}</span>
                        <small style="color:#888;">到期: ${l.deadline}</small>
                    </div>
                </div>`).join('');
        }

        async function fetchTrans(){
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'trans',uid:user.id})}).then(r=>r.json());
            tList.innerHTML = res.list.map(t => `<div class="card"><b>${t.desc}</b> <span style="color:${t.amount>0?'#10b981':'#ff5252'}">${t.amount>0?'+':''}${t.amount}</span><br><small>${t.date} | ${t.note}</small></div>`).join('');
        }
    </script>
</body>
</html>
