<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑會員網-旗艦大字版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --pink: #FFD1DC; --accent: #FF8FA3; --text: #ffffff; --danger: #ff4d4d; }
        body { font-family: "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        /* 系統處理中 - 強化視覺 */
        #loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { width: 100px; height: 100px; border: 10px solid #333; border-top: 10px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loading-text { color: var(--pink); font-size: 28px; font-weight: 900; margin-top: 30px; text-shadow: 0 0 10px var(--accent); }

        /* 右上角功能區 - 放大 */
        .top-nav { position: fixed; top: 0; width: 100%; height: 90px; display: flex; justify-content: flex-end; align-items: center; padding: 0 25px; box-sizing: border-box; z-index: 100; }
        .icon-btn { background: var(--card); color: var(--pink); border: 2px solid var(--accent); padding: 15px; border-radius: 18px; margin-left: 15px; cursor: pointer; font-size: 32px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* 滑動分頁 */
        #appView { height: 100vh; display: none; flex-direction: column; }
        .slide-wrap { display: flex; width: 400%; height: 100%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .page { width: 25%; height: 100%; overflow-y: auto; padding: 110px 25px 120px; box-sizing: border-box; }

        /* 下方導覽列 - 巨型化 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 100px; background: var(--card); display: flex; border-top: 2px solid #444; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--pink); background: rgba(255,209,220,0.05); }
        .nav-item span { font-size: 38px; margin-bottom: 5px; }

        /* 卡片設計 - 大字體 */
        .card { background: var(--card); border-radius: 30px; padding: 35px; margin-bottom: 25px; border: 1px solid #444; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .main-btn { width: 100%; padding: 25px; border-radius: 20px; background: var(--accent); color: white; border: none; font-size: 26px; font-weight: 900; margin: 15px 0; box-shadow: 0 8px 0 #d66a7e; }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #d66a7e; }
        
        input { width: 100%; padding: 22px; border-radius: 18px; background: #333; border: 2px solid #555; color: white; margin: 12px 0; font-size: 22px; box-sizing: border-box; text-align: center; }
        h2, h3 { font-size: 32px; margin-bottom: 20px; color: var(--pink); }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div class="loading-text">系統處理中，請稍後...</div></div>

<div id="loginView" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
    <h1 style="color:var(--pink); font-size:48px; margin-bottom:50px; text-shadow: 0 0 20px rgba(255,209,220,0.5);">小佑會員網</h1>
    <input type="tel" id="acc" placeholder="手機號碼">
    <input type="password" id="pw" placeholder="登入密碼">
    <button class="main-btn" onclick="handleAuth()">登入系統</button>
</div>

<div id="appView">
    <div class="top-nav">
        <div class="icon-btn" onclick="showMyQR()">🔳</div>
        <div class="icon-btn" onclick="location.reload()">🚪</div>
    </div>

    <div class="slide-wrap" id="slide">
        <div class="page">
            <h2 style="color:white;">你好，<span id="uName" style="color:var(--pink);">...</span></h2>
            <div class="card">
                <div style="color:var(--pink); font-size:24px; font-weight:bold;">帳戶餘額</div>
                <div style="font-size:72px; font-weight:900; margin:15px 0;">$ <span id="uBal">0</span></div>
            </div>
            <button class="main-btn" onclick="startTopup()">發起儲值服務</button>
        </div>
        <div class="page"><h3>交易紀錄</h3><div id="transList" style="font-size:20px;">資料載入中...</div></div>
        <div class="page"><h3>我的優惠券</h3><div id="couponList" style="font-size:20px;">目前尚無優惠</div></div>
        <div class="page">
            <h3>個人中心</h3>
            <div class="card">
                <input type="text" id="editName" placeholder="修改姓名">
                <button class="main-btn" style="background:#555; padding:15px; font-size:20px;" onclick="updateProfile()">儲存修改</button>
            </div>
            <button class="main-btn" style="background:#444; font-size:20px;" onclick="changePW()">變更密碼</button>
            <button class="main-btn" style="background:none; border:2px solid var(--danger); color:var(--danger); margin-top:30px;" onclick="deleteAcc()">刪除帳號</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="go(0, this)"><span>🏠</span>首頁</div>
        <div class="nav-item" onclick="go(1, this)"><span>🧾</span>紀錄</div>
        <div class="nav-item" onclick="go(2, this)"><span>🎟️</span>優惠</div>
        <div class="nav-item" onclick="go(3, this)"><span>👤</span>我的</div>
    </div>
</div>

<div id="overlay" onclick="this.style.display='none'" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:5000; justify-content:center; align-items:center;">
    <div id="qrBox" style="background:white; padding:45px; border-radius:40px; text-align:center;" onclick="event.stopPropagation()">
        <h2 id="popT" style="color:#111; margin:0 0 25px; font-size:32px;"></h2>
        <div id="qrcode" style="display:inline-block; border:10px solid white;"></div>
        <p style="color:#666; font-size:22px; font-weight:bold; margin-top:25px;">請將螢幕亮度調高</p>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby5cwOhok9ANFdB7Hx8xGszckMP-0_PUb3u4DfDME_hzjW1plAUBdoP8tJ7C5ukwnOd/exec";
    let user = null;

    function toggleL(s) { document.getElementById('loading').style.display = s?'flex':'none'; }
    function go(i, el) { 
        document.getElementById('slide').style.transform = `translateX(-${i*25}%)`; 
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        el.classList.add('active');
    }

    async function handleAuth() {
        toggleL(true);
        const acc = document.getElementById('acc').value;
        const pw = document.getElementById('pw').value;
        const res = await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'login', acc, pw})}).then(r=>r.json());
        toggleL(false);
        if(res.success) {
            user = res;
            document.getElementById('loginView').style.display='none';
            document.getElementById('appView').style.display='flex';
            document.getElementById('uName').innerText = user.name;
            document.getElementById('uBal').innerText = user.balance;
            document.getElementById('editName').value = user.name;
        } else alert(res.message);
    }

    function showMyQR() {
        document.getElementById('qrcode').innerHTML = "";
        document.getElementById('popT').innerText = "會員碼";
        new QRCode(document.getElementById('qrcode'), {text: user.id, width:280, height:280});
        document.getElementById('overlay').style.display='flex';
    }

    function startTopup() {
        const amt = prompt("請輸入儲值金額");
        if(!amt) return;
        document.getElementById('qrcode').innerHTML = "";
        document.getElementById('popT').innerText = "儲值 $"+amt;
        new QRCode(document.getElementById('qrcode'), {text: `TOPUP|${user.id}|${amt}`, width:280, height:280});
        document.getElementById('overlay').style.display='flex';
    }
</script>
</body>
</html>
