<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小佑日常生活會員</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --bg: #ffffff; --text: #000000; --card: #f5f5f5; --border: #eeeeee;
            --pink: #FF8FA3; --accent: #FF8FA3; --red: #ff5252; --green: #2ecc71; --nav: #fdfdfd; 
        }
        [data-theme='dark'] {
            --bg: #000000; --text: #ffffff; --card: #151515; --border: #282828;
            --pink: #FFD1DC; --nav: #0a0a0a;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; font-weight: 900; transition: 0.3s; }
        .page { width: 100vw; min-height: 100vh; padding: 100px 20px 130px; box-sizing: border-box; display: none; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .btn { width: 100%; padding: 18px; border-radius: 15px; background: var(--accent); color: #fff; border: none; font-size: 18px; font-weight: 900; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--nav); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.4; font-size: 13px; }
        .nav-item.active { opacity: 1; color: var(--pink); }
        .tx-up { color: var(--green); } .tx-down { color: var(--red); }
    </style>
</head>
<body data-theme="light">
    <div id="loginView" style="display:flex; height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
        <h1 style="color:var(--pink);">小佑日常生活會員</h1>
        <input type="text" id="acc" placeholder="帳號" style="width:100%; padding:15px; margin:10px; border-radius:10px; border:1px solid #ddd;">
        <input type="password" id="pw" placeholder="密碼" style="width:100%; padding:15px; margin:10px; border-radius:10px; border:1px solid #ddd;">
        <button class="btn" onclick="login()">登入</button>
    </div>

    <div id="appView" style="display:none;">
        <div id="p0" class="page" style="display:block;">
            <h2>你好，<span id="uName">...</span></h2>
            <div class="card" style="text-align:center;">
                <p style="opacity:0.6;">可用餘額</p>
                <h1 style="font-size:50px; color:var(--pink);">$ <span id="uBal">0</span></h1>
            </div>
            <button class="btn" onclick="showQR()">個人識別碼</button>
        </div>
        <div id="p1" class="page"><h2>紀錄</h2><div id="tList"></div></div>
        <div id="p3" class="page">
            <h2>設定</h2>
            <div class="card">
                <p>深色模式</p>
                <button class="btn" id="themeBtn" onclick="toggleTheme()" style="background:#555;">切換模式</button>
            </div>
            <button class="btn" style="background:var(--red); margin-top:20px;" onclick="location.reload()">登出</button>
        </div>
        <nav class="nav-bar">
            <div class="nav-item active" onclick="go(0)">首頁</div>
            <div class="nav-item" onclick="go(1)">紀錄</div>
            <div class="nav-item" onclick="go(3)">設定</div>
        </nav>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbyiQ_n7p5irgP3kDwx5PpzHhdUWKce8ILwWS0mT4PUu7oBF_2IwiFmEiRHSiuorO1dq/exec"; 
        let user = null; 

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            applyTheme(target);
        }
        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('themeBtn').innerText = theme === 'dark' ? '🌞 切換淺色' : '🌙 切換深色';
        }
        applyTheme(localStorage.getItem('theme') || 'light');

        async function login() {
            const acc = document.getElementById('acc').value;
            const res = await fetch(GAS, {method:'POST', body:JSON.stringify({action:'fetchData', uid:acc})}).then(r=>r.json());
            if(res.success) {
                user = res.list[0];
                document.getElementById('uName').innerText = user.name;
                document.getElementById('uBal').innerText = user.bal;
                document.getElementById('loginView').style.display='none';
                document.getElementById('appView').style.display='block';
            }
        }

        function renderTransactions(history) {
            document.getElementById('tList').innerHTML = history.map(t => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;"><b>${t.item}</b><span class="${t.amt>=0?'tx-up':'tx-down'}">$${t.amt}</span></div>
                    <div style="font-size:12px; opacity:0.5; margin-top:5px;">${t.time}</div>
                    ${t.note ? `<div style="color:var(--pink); font-size:12px; margin-top:5px;">備註：${t.note}</div>` : ''}
                </div>
            `).join('');
        }

        function go(idx) {
            document.querySelectorAll('.page').forEach((p,i) => p.style.display = i===idx ? 'block' : 'none');
            document.querySelectorAll('.nav-item').forEach((n,i) => i===idx ? n.classList.add('active') : n.classList.remove('active'));
        }
    </script>
</body>
</html>
