<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的錢包 v12.9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --pink: #FFD1DC; --accent: #FF8FA3; --card: #151515; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; font-weight: 900; }
        .page { width: 100vw; min-height: 100vh; padding: 100px 20px; display: none; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0a0a0a; display: flex; border-top: 1px solid #222; }
        .nav-i { flex: 1; display: flex; align-items: center; justify-content: center; color: #666; }
        .active { color: var(--pink); }
        .detail { font-size: 13px; color: #888; margin-top: 10px; line-height: 1.5; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <div id="app" style="display:none;">
        <div id="p0" class="page" style="display:block;">
            <h2>餘額</h2>
            <div class="card" style="text-align:center; font-size:40px; color:var(--pink);">$ <span id="uBal">0</span></div>
        </div>
        <div id="p1" class="page">
            <h2>借還款進度</h2>
            <div id="loanList"></div>
        </div>
        <div class="nav">
            <div class="nav-i active" onclick="go(0)">首頁</div>
            <div class="nav-i" onclick="go(1)">帳務</div>
        </div>
    </div>

    <div id="login" style="padding:40px; text-align:center; padding-top:100px;">
        <h1 style="color:var(--pink)">LOGIN</h1>
        <input type="text" id="acc" placeholder="帳號" style="width:100%; padding:15px; margin:10px 0; background:#222; border:none; color:#fff;">
        <input type="password" id="pw" placeholder="密碼" style="width:100%; padding:15px; margin:10px 0; background:#222; border:none; color:#fff;">
        <button onclick="doLogin()" style="width:100%; padding:15px; background:var(--accent); border:none; color:#fff; font-weight:bold;">登入</button>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbyomoOmzCXe9Q_gMrlMN3pvVaL41G143g6ujxfVSrbubyvg9fAgX3xHq1akjrDcDiZ5/exec";
        let user = null;

        async function doLogin() {
            const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'login',acc:acc.value,pw:pw.value})}).then(r=>r.json());
            if(res.success) { user=res; uBal.innerText=res.balance; login.style.display='none'; app.style.display='block'; } else alert("失敗");
        }

        async function go(idx) {
            document.querySelectorAll('.page').forEach(p=>p.style.display='none');
            document.getElementById('p'+idx).style.display='block';
            if(idx===1) {
                const res = await fetch(GAS,{method:'POST',body:JSON.stringify({action:'fetchData',type:'loans',uid:user.id})}).then(r=>r.json());
                loanList.innerHTML = res.list.map(l=>`
                    <div class="card">
                        <b>${l.item}</b> <span style="float:right; color:var(--pink)">剩 $${l.remain}</span>
                        <div class="detail">
                            本金：$${l.principal}<br>
                            已還：$${l.paid}<br>
                            罰金：$${l.interest} (10/天)<br>
                            期限：${l.deadline}<br>
                            狀態：${l.status}
                        </div>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
